        <br />
        <span id="LabelDocument"><P class=A0001 align=justify>&#167;209. &nbsp;Nonrecognition of gain or loss on contribution </P>
<P class=A0002 align=justify>No gain or loss shall be recognized to a partnership or to any of its partners in the case of a contribution of property to the partnership in exchange for an interest in the partnership. &nbsp;</P>
<P class=A0002 align=justify>Added by Acts 1958, No. 441, &#167;2. &nbsp;</P></span>
