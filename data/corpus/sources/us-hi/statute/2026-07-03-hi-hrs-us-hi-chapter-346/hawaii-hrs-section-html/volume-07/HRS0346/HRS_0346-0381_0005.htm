<p class="RegularParagraphs">     <b>§346-381.5  Coordinator on homelessness.</b> 
The governor shall appoint the coordinator on homelessness for the proper
administration and enforcement of this chapter without regard to chapter 76. [L
2019, c 81, §2; am L 2025, c 309, §9]</p>
