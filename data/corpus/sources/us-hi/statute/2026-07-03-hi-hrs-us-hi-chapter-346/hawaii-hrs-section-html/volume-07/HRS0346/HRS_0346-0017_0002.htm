<p class="RegularParagraphs">     <b>[</b><b>§346-17.2]  Health assessment.</b> 
The department shall ensure the provision of a comprehensive health assessment
for each child in out-of-home placement forty-five days before or after an
initial placement. [L 2010, c 135, pt of §2]</p>
