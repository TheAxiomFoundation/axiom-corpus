<p class="RegularParagraphs">     <b>[§346-158]</b>  <b>No smoking in child care
facilities.</b>  Smoking shall be prohibited in all group child care homes,
group child care centers, and family child care homes during their hours of
operation. [L 1993, c 68, §1]</p>

<p class="RegularParagraphs">&nbsp;</p>
