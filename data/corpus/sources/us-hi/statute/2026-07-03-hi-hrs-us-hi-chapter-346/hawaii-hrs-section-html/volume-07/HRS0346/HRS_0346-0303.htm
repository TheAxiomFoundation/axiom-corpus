<p class="RegularParagraphs">     <b>[§346-303]  Rules.</b>  The department of
human services shall maintain rules describing eligibility criteria for
adoption assistance and describing the types, duration, and amounts of adoption
assistance benefits that may be received. [L 1992, c 190, pt of §1]</p>
