name: Publish named corpus release

# Corpus data merges are inert. Production changes only from a clean committed
# checkout when an explicit immutable selector cuts a source-complete,
# content-addressed, projection-bound, Ed25519-signed release object and the
# management plane activates it.
on:
  push:
    branches: [main, master]
    paths:
      - "manifests/releases/*.json"
  workflow_dispatch:
    inputs:
      release:
        description: "Immutable release selector name or manifests/releases/*.json path"
        required: true
        type: string

concurrency:
  group: publish-corpus-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      AXIOM_CORPUS_RELEASE_PRIVATE_KEY: ${{ secrets.AXIOM_CORPUS_RELEASE_PRIVATE_KEY }}
      AXIOM_CORPUS_RELEASE_PUBLIC_KEY: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install package
        run: python -I -m pip install -e .

      - name: Require the complete publication trust boundary
        run: |
          missing=0
          for var in \
            SUPABASE_ACCESS_TOKEN \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            AXIOM_CORPUS_RELEASE_PRIVATE_KEY \
            AXIOM_CORPUS_RELEASE_PUBLIC_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required publication value $var is not set."
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Select immutable release cuts
        id: selectors
        env:
          DISPATCH_RELEASE: ${{ github.event.inputs.release }}
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "$DISPATCH_RELEASE" > "$RUNNER_TEMP/release-selectors.txt"
          else
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$HEAD^"
            fi
            git diff --name-only --diff-filter=AM "$BEFORE" "$HEAD" -- \
              'manifests/releases/*.json' > "$RUNNER_TEMP/release-selectors.txt"
          fi
          if [ ! -s "$RUNNER_TEMP/release-selectors.txt" ]; then
            echo "No added or modified immutable release selector; no publication cut."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(grep -cve '^$' "$RUNNER_TEMP/release-selectors.txt")" -ne 1 ]; then
            echo "::error::One publication run must activate exactly one named release."
            exit 1
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          cat "$RUNNER_TEMP/release-selectors.txt"

      - name: Validate, sign, and activate the named release through the management plane
        if: steps.selectors.outputs.publish == 'true'
        run: |
          while IFS= read -r selector; do
            [ -n "$selector" ] || continue
            python scripts/publish_corpus.py \
              --release "$selector" \
              --output "$RUNNER_TEMP/$(basename "$selector" .json)-release-object.json"
          done < "$RUNNER_TEMP/release-selectors.txt"

      - name: Publication summary
        if: always()
        run: |
          {
            echo "### Named corpus release publication"
            echo ""
            echo "The release must bind the exact artifact/source inventory and canonical provision/navigation projection digests."
            echo "Conditional R2 writes, exact readback, pre-sign database evidence, local Ed25519 verification, and management-plane transactional activation must all pass."
            echo "The staging service role cannot activate a release; exact retries only verify and reuse immutable state."
          } >> "$GITHUB_STEP_SUMMARY"
