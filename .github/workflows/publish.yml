name: Publish named corpus release

# Corpus data merges are inert. Production changes only from a clean committed
# checkout when an explicit immutable selector cuts a source-complete,
# content-addressed, projection-bound, Ed25519-signed release object and the
# management plane activates it.
on:
  push:
    branches: [main, master]
    paths:
      - "manifests/releases/*.json"
  workflow_dispatch:
    inputs:
      release:
        description: "Immutable release selector name or manifests/releases/*.json path"
        required: true
        type: string

concurrency:
  group: publish-corpus-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      AXIOM_CORPUS_RELEASE_PRIVATE_KEY: ${{ secrets.AXIOM_CORPUS_RELEASE_SIGNING_KEY }}
      AXIOM_CORPUS_RELEASE_PUBLIC_KEY: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
      AXIOM_CORPUS_RELEASE_LEGACY_PUBLIC_KEYS: ${{ vars.AXIOM_CORPUS_RELEASE_LEGACY_PUBLIC_KEYS }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install package
        run: python -I -m pip install -e .

      - name: Require the complete publication trust boundary
        run: |
          missing=0
          for var in \
            SUPABASE_ACCESS_TOKEN \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            AXIOM_CORPUS_RELEASE_PRIVATE_KEY \
            AXIOM_CORPUS_RELEASE_PUBLIC_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required publication value $var is not set."
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Select immutable release cuts
        id: selectors
        env:
          DISPATCH_RELEASE: ${{ github.event.inputs.release }}
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '%s\n' "$DISPATCH_RELEASE" > "$RUNNER_TEMP/release-selectors.txt"
          else
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$HEAD^"
            fi
            git diff --name-only --diff-filter=AM "$BEFORE" "$HEAD" -- \
              'manifests/releases/*.json' > "$RUNNER_TEMP/release-selectors.txt"
          fi
          if [ ! -s "$RUNNER_TEMP/release-selectors.txt" ]; then
            echo "No added or modified immutable release selector; no publication cut."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(grep -cve '^$' "$RUNNER_TEMP/release-selectors.txt")" -ne 1 ]; then
            echo "::error::One publication run must publish exactly one named release."
            exit 1
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          cat "$RUNNER_TEMP/release-selectors.txt"

      - name: Validate and sign the named release (publish only; activation is separate)
        if: steps.selectors.outputs.publish == 'true'
        run: |
          # Publication stages content-addressed R2 artifacts + versioned Supabase
          # rows and signs the release object. It does NOT move serving: activation
          # repoints the per-scope serving map and can displace another
          # jurisdiction's release (axiom-corpus#408), so it is a separate,
          # deliberate step run via scripts/activate_release.py (with --dry-run to
          # preview the takeover first).
          while IFS= read -r selector; do
            [ -n "$selector" ] || continue
            python scripts/publish_corpus.py \
              --release "$selector" \
              --output "$RUNNER_TEMP/$(basename "$selector" .json)-release-object.json"
          done < "$RUNNER_TEMP/release-selectors.txt"

      - name: Retain the signed release object for activation
        if: steps.selectors.outputs.publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signed-corpus-release-object
          path: ${{ runner.temp }}/*-release-object.json
          if-no-files-found: error
          retention-days: 30

      - name: Publication summary
        if: always()
        run: |
          {
            echo "### Named corpus release publication (sign only)"
            echo ""
            echo "The release binds the exact artifact/source inventory and canonical provision/navigation projection digests."
            echo "Conditional R2 writes, exact readback, pre-sign database evidence, and local Ed25519 verification must all pass."
            echo "This step does NOT activate: serving is unchanged. Activation is a separate, deliberate step (scripts/activate_release.py, preview with --dry-run) because it repoints the per-scope serving map and can displace another jurisdiction's release (axiom-corpus#408)."
          } >> "$GITHUB_STEP_SUMMARY"
