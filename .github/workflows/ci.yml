name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily 12:00 UTC — catches release-coverage drift if a new
    # jurisdiction lands in corpus.provisions / navigation_nodes
    # without a matching active row in corpus.release_scopes.
    - cron: "0 12 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check changelog fragments
        run: python -m towncrier build --draft --version 0.0.0

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Type check with mypy
        run: |
          mypy src/axiom_corpus/corpus --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pip install pytest-cov pytest-timeout
          pytest -v --cov=axiom_corpus --cov-report=term-missing --cov-config=pyproject.toml --timeout=60

  postgres:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: axiom_corpus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Test PostgreSQL connection
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/axiom_corpus_test
        run: |
          python -c "
          from axiom_corpus.storage import PostgresStorage
          storage = PostgresStorage()
          print('PostgreSQL connection successful')
          print('Stats:', storage.get_stats())
          "

  verify-release-coverage:
    name: Verify release coverage
    # Skip on PRs:
    # - Pull-request CI runs in fork context cannot read repo/org secrets.
    # - Pre-merge is the wrong gate anyway: the check reads PRODUCTION
    #   Supabase state; a PR that adds a new jurisdiction hasn't yet
    #   landed any rows in production at PR-CI time, so the check would
    #   pass even though the manifest is missing an entry.
    # - The intent is "catch drift fast" — runs on push-to-main and on a
    #   daily cron.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      # Reuse the anon (read-only, RLS-gated) Supabase key already
      # provisioned as an org secret for the foundation.org deploy.
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify release coverage
        if: env.SUPABASE_ANON_KEY != ''
        run: |
          axiom-corpus-ingest verify-release-coverage \
            --service-key-env SUPABASE_ANON_KEY

      - name: Skip release coverage without Supabase secret
        if: env.SUPABASE_ANON_KEY == ''
        run: |
          echo "Skipping release coverage: NEXT_PUBLIC_SUPABASE_ANON_KEY is not available in this GitHub Actions context."
