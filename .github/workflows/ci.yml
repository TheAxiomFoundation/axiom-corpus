name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily 12:00 UTC — catches release-coverage drift if a new
    # jurisdiction lands in corpus.provisions / navigation_nodes
    # without a matching active row in corpus.release_scopes.
    - cron: "0 12 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install corpus artifact guard
        if: github.event_name != 'schedule'
        run: |
          cd "$RUNNER_TEMP"
          python -I -m pip install --upgrade pip
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            VERIFIER_DIR="$RUNNER_TEMP/axiom-corpus-verifier"
            git clone --no-checkout "$GITHUB_SERVER_URL/${{ github.repository }}.git" "$VERIFIER_DIR"
            git -C "$VERIFIER_DIR" fetch --depth 1 origin "$BASE_REF"
            git -C "$VERIFIER_DIR" checkout --detach "$BASE_REF"
            if [ -f "$VERIFIER_DIR/src/axiom_corpus/corpus/ingest_manifests.py" ]; then
              python -I -m pip install "$VERIFIER_DIR"
            else
              echo "Base commit has no ingest guard yet; using checked-out bootstrap guard."
              python -I -m pip install -e "$GITHUB_WORKSPACE"
            fi
          else
            python -I -m pip install -e "$GITHUB_WORKSPACE"
          fi

      - name: Guard generated corpus artifacts
        if: github.event_name != 'schedule'
        env:
          AXIOM_CORPUS_INGEST_PUBLIC_KEY: ${{ vars.AXIOM_CORPUS_INGEST_PUBLIC_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF="HEAD~1"
          fi
          axiom-corpus-ingest guard-ingested \
            --base-ref "$BASE_REF" \
            --head-ref "${{ github.sha }}"

      - name: Install dependencies
        run: |
          cd "$RUNNER_TEMP"
          python -I -m pip install --upgrade pip
          python -I -m pip install -e "$GITHUB_WORKSPACE[dev]"

      - name: Check changelog fragments
        run: python -m towncrier build --draft --version 0.0.0

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Type check with mypy
        run: |
          mypy src/axiom_corpus/corpus --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          python -I -m pip install pytest-cov pytest-timeout
          pytest -v --cov=axiom_corpus --cov-report=term-missing --cov-config=pyproject.toml --timeout=60

  citation-path-grammar:
    name: Citation-path grammar (A6)
    # Additive gate: validates every corpus citation_path against the versioned
    # grammar (schema/citation-path.v1.json) and enforces the irregular-family
    # and identity-drift ratchets. Pure local scan — no Supabase, no secrets —
    # so it runs on PRs too, unlike verify-release-coverage.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Validate citation paths against the grammar
        run: |
          python scripts/validate_citation_paths.py

  postgres:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: axiom_corpus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Test PostgreSQL connection
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/axiom_corpus_test
        run: |
          python -c "
          from axiom_corpus.storage import PostgresStorage
          storage = PostgresStorage()
          print('PostgreSQL connection successful')
          print('Stats:', storage.get_stats())
          "

  verify-release-coverage:
    name: Verify release coverage
    # Skip on PRs:
    # - Pull-request CI runs in fork context cannot read repo/org secrets.
    # - Pre-merge is the wrong gate anyway: the check reads PRODUCTION
    #   Supabase state; a PR that adds a new jurisdiction hasn't yet
    #   landed any rows in production at PR-CI time, so the check would
    #   pass even though the manifest is missing an entry.
    # - The intent is "catch drift fast" — runs on push-to-main and on a
    #   daily cron.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      # Reuse the anon (read-only, RLS-gated) Supabase key already
      # provisioned as an org secret for the foundation.org deploy.
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify release coverage
        if: env.SUPABASE_ANON_KEY != ''
        run: |
          axiom-corpus-ingest verify-release-coverage \
            --service-key-env SUPABASE_ANON_KEY

      - name: Skip release coverage without Supabase secret
        if: env.SUPABASE_ANON_KEY == ''
        run: |
          echo "Skipping release coverage: NEXT_PUBLIC_SUPABASE_ANON_KEY is not available in this GitHub Actions context."

  validate-release:
    name: Validate release artifacts
    # Deep validation of every release scope: artifact presence,
    # canonical inventory shape, coverage completeness, provision
    # invariants, unsectioned-document warnings. Scopes whose
    # artifacts live only in R2 need R2 credentials to validate;
    # without the secrets this job reports and exits neutrally so it
    # arms itself the moment the secrets are added.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package
        run: python -I -m pip install -e .
      - name: Validate release
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ]; then
            echo "::notice::R2 secrets not configured — running local-artifact validation only (remote-only scopes will be skipped from failure accounting once secrets exist; until then this reports without failing)."
            axiom-corpus-ingest validate-release --base data/corpus --max-issues 100 || true
          else
            axiom-corpus-ingest validate-release --base data/corpus --include-r2 --ignore-r2-missing --max-issues 100
          fi
