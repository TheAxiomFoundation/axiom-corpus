# Uganda individual income-tax rate capture (rulespec-ug PAYE slice,
# UGAMOD tin_ug parity).
#
# The Income Tax (Amendment) Act, 2012 (Act 4 of 2012, assent 26 Sep 2012,
# deemed in force 1 July 2012 per s.1) SUBSTITUTES the Third Schedule
# rate tables of the Income Tax Act, Cap. 340: Part I resident individuals
# (nil to 2,820,000; 10% to 4,020,000; 120,000 + 20% to 4,920,000;
# 300,000 + 30% above; additional 10% on chargeable income exceeding
# 120,000,000) and non-resident individuals (10% to 4,020,000; 402,000 +
# 20% to 4,920,000; 582,000 + 30% above; same additional 10%), plus
# conforming Part V/VI changes (government-securities withholding 20%;
# presumptive threshold figure 2,820,000).
#
# Chain diligence (prints on disk, parliament CMIS): the later ITA
# amendment acts 2014-2024 do not touch Part I resident/non-resident
# rates - 2024 inserts Part XIV (payment-service-provider WHT); 2022 sets
# the Part II rental-individual row (12% of gross rental exceeding
# 2,820,000); 2018/2019/2020/2023 Third Schedule touches are other Parts
# (classified at their own captures). ULII consolidations @2023-12-31 and
# @2024-12-23 show the identical Part I text in force.
#
# NOTE (open question, rulespec-ug listing gate 3): the 2023 Revised
# Edition (ULII/Laws.Africa) renumbers the ITA as Chapter 338 while
# Parliament's own 2024 assented print still cites "Cap. 340". Citation
# paths here use the act-number form (act-2012-4) to stay
# numbering-neutral.
