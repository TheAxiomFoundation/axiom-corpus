# Peru (pe) tranche-1 capture - PERUMOD v2.4 parity (policy years 2019-24;
# SOUTHMOD full-bundle program lane 3; report CR-PERUMOD-v2-4).
#
# PERUMOD simulates (S): personal income tax (tin_pe), VAT/IGV and excise
# (tva_pe/tex_pe), social insurance contributions (employee pension
# tscee_pe: ten percent AFP or thirteen percent ONP; self-employed health
# tscse_pe; employer health tscer_pe: EsSalud nine percent, micro-enterprise
# fifty/fifty split), the Juntos conditional cash transfer (bsa_pe), the
# Pension 65 subsidised pension (~S/250 payable bimonthly at 65+ under
# SISFOH targeting), and the 2020-21 COVID bonos.
#
# STATUTE class, three instruments:
#
# 1. TUO de la Ley del Impuesto a la Renta, Decreto Supremo N. 179-2004-EF
#    (published 8 December 2004; Congreso library print of the ordered sole
#    text) - the income-tax baseline PERUMOD's tin_pe builds on (Articles
#    33-34 categories; UIT-banded schedule). The post-2004 amendment chain
#    (e.g. Decreto Legislativo 1258 and later UIT-band changes through the
#    2019-24 window) is a documented tranche-2 gap.
# 2. TUO de la Ley del Impuesto General a las Ventas e Impuesto Selectivo
#    al Consumo, Decreto Supremo N. 055-99-EF (MEF-published consolidated
#    print, 2018 file) - Articulo 17: "La tasa del impuesto es 16%" (the
#    18 percent PERUMOD applies = 16 percent IGV + 2 percent municipal
#    promotion tax IPM); ISC provisions for tex_pe.
# 3. Ley N. 26790, Ley de Modernizacion de la Seguridad Social en Salud
#    (Congreso library print) - the EsSalud contribution framework behind
#    the employer nine percent health contribution.
#
# PERUMOD comparison notes (targets, never sources): pension employee ten
# percent (AFP) / thirteen percent (ONP); EsSalud employer nine percent
# (micro-enterprises split fifty/fifty); IGV eighteen percent total;
# Pension 65 ~S/250 bimonthly; Juntos CCT under SISFOH. Report reference:
# CR-PERUMOD-v2-4 (UNU-WIDER) sections 1-2.
