# Uganda Senior Citizens Grant capture (rulespec-ug instrument 8, UGAMOD
# boa_ug parity; tracking rulespec-ug#1).
#
# The SCG is administratively set (no per-beneficiary statute): the
# Ministry of Gender, Labour and Social Development's Expanding Social
# Protection programme pays Shs. 25,000 per month to older persons -
# nationally to everyone aged 80+ (NIRA-verified), with the original
# rollout districts keeping their earlier eligibility (the oldest-100
# per subcounty selection in FY2016/17 rollout districts; earlier pilot
# districts at lower ages). UGAMOD's boa_ug implements the 25,000/month
# with dag>=60 / dag>=65 district lists plus the national dag>=80 rule.
#
# Source: the programme's own SAGE Handbook (socialprotection.go.ug,
# MGLSD/ESP) - the official programme documentation, policy-class like
# the Ghana LEAP capture. Captured single-block from the identification,
# rollout and amount chapters (digital text layer).
