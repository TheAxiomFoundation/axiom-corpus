# Colombia (co) tranche-1 capture - COLMOD v6.0 parity (policy years
# 2019-25; SOUTHMOD full-bundle program lane 4; report CR-COLMOD-v6.0).
#
# COLMOD simulates (S): personal income tax (tin_s; UVT-denominated schedular
# system - labour/pension/capital/dividend schedules, report Tables
# 2.21-2.24), health and pension social insurance contributions (health
# 12.5 percent split 4 employee / 8.5 employer; pension 16 percent split
# 4 / 12; the solidarity fund FSP 1-2 percent bands; pensioners' health;
# employer ARL/CCF/severance/SENA/ICBF contributions - report Tables
# 2.9-2.20), the Familias en Accion and Jovenes en Accion conditional
# transfers, Colombia Mayor, the 2020-22 Ingreso Solidario, VAT (0/5/19
# percent), the national consumption tax, and fuel subsidies.
#
# STATUTE class, three instruments (SUIN-Juriscol official norm pages, HTML
# capture; SUIN serves the as-enacted text with amendment annotations):
#
# 1. Ley 100 de 1993 (Sistema de Seguridad Social Integral) - the
#    contribution framework COLMOD's SIC modules build on (health and
#    pension aportes, the solidarity fund, the pensioners' regime).
# 2. Ley 2010 de 2019 (crecimiento economico) - the operative personal
#    income tax reform for the COLMOD window: rewrites the Estatuto
#    Tributario Art. 241 UVT-banded schedule applied from 2020, dividend
#    taxation, and VAT adjustments. (The Estatuto Tributario base decree
#    624/1989 and the later Ley 2277 de 2022 reform are tranche-2
#    captures; COLMOD's 2023+ parameters follow 2277.)
# 3. Ley 1532 de 2012 (Familias en Accion) - the conditional cash
#    transfer's governing law (direct monetary transfer, conditional and
#    periodic, to families in poverty and extreme poverty; minors under 18).
#
# COLMOD comparison notes (targets, never sources): health SIC 12.5 percent
# (4 ee / 8.5 er); pension SIC 16 percent (4 ee / 12 er); FSP 1 percent
# above 4 minimum wages rising to 2 percent at 20+; PIT in UVT per the
# Art. 241 schedules; VAT 19 percent general / 5 percent reduced / exempt
# and excluded lists. Report reference: CR-COLMOD-v6.0 (UNU-WIDER)
# sections 1-2, Tables 2.9-2.27.
