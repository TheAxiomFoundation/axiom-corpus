      source_note: >-
        Office of the Solicitor General e-library print of the
        Appropriation Act, 2022 (No. 4 of 2022; 16-page text-embedded
        Government Printer print, Act Supplement to the Gazette of 30
        June 2022, assented by the President on 30 June 2022). Grounds
        section 3 (the Treasury may issue out of the Consolidated Fund
        and apply towards the supply granted for the service of the
        year ending on the thirtieth day of June 2023 the sum of
        Forty-One Trillion, Four Hundred Eighty Billion, Five Hundred
        Seventy-Nine Million, Eight Hundred Eighteen Thousand
        Shillings) and section 4 (appropriation for the purposes and
        amounts in the Schedule of votes). Captured as the statutory
        higher-authority anchor for the policy-class TASAF PSSN II
        transfer encoding: the Act authorizes the FY2022/23
        expenditure - the TAZMOD TZ_2023 validation year - and
        prescribes no transfer value, which is set administratively by
        the TASAF programme documentation captured alongside.
