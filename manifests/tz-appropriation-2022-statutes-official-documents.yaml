# Tanzania Appropriation Act capture - STATUTE class (rulespec-tz PSSN
# higher-authority anchor; tracking rulespec-tz#1).
#
# One primary Act:
#
# 1. The Appropriation Act, 2022 (No. 4 of 2022) - authorizes the
#    Treasury to issue TZS 41,480,579,818,000 out of the Consolidated
#    Fund for the service of the year ending 30 June 2023 (section 3)
#    and appropriates it per the Schedule of votes (section 4). The
#    statutory expenditure authority for FY2022/23 - the TAZMOD
#    TZ_2023 validation year - under which the TASAF Productive Social
#    Safety Net transfers are funded; the Act prescribes no transfer
#    value (the Zambia Appropriation Act 2024 / Rwanda State Finance
#    Law 066/2024 anchoring pattern).
