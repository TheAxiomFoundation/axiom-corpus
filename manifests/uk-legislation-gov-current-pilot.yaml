version: "2026-06-07"
document_family: uk_legislation_gov_current_revised
jurisdiction: uk
source_authority: legislation.gov.uk
source_format: legislation.gov.uk-clml
release_manifest: manifests/releases/uk-legislation-pilot.json
github_issue: https://github.com/TheAxiomFoundation/axiom-corpus/issues/95
policy:
  canonical_pipeline: source-first
  source_policy: primary_official_only
  source_scope:
    - Current revised legislation.gov.uk CLML provision XML.
    - UK Public General Acts and statutory instruments cited by PE-UK or RuleSpec-UK.
    - Devolved primary and secondary legislation when cited by PE-UK or RuleSpec-UK.
  durable_artifacts:
    - sources
    - inventory
    - provisions
    - coverage
  excluded_from_this_release:
    - GOV.UK, HMRC, DWP, DfE, and other non-legislation guidance or manuals.
    - Lex API artifacts until they are re-extracted or mirrored as official legislation.gov.uk CLML.
    - Legacy HTML compatibility artifacts until they are re-extracted as CLML.
    - Historical, made-only, amending, private, and local legislation unless needed for current-law interpretation.
