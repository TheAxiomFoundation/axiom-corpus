      source_note: >-
        Official tax-year-2026 Form 540-ES instructions and California
        Estimated Tax Worksheet. The worksheet publishes 2026 standard
        deductions of $5,706 for single or married/RDP filing separately and
        $11,412 for married/RDP filing jointly, head of household, or
        qualifying surviving spouse/RDP. Line 4 expressly directs use of the
        2025 Form 540 or Form 540NR tax table; this intake therefore does not
        project a final tax-year-2026 return schedule. Section D and worksheet
        line 17 impose the 1% Behavioral Health Services Tax on taxable income
        over $1,000,000. This source supports estimated-tax worksheet
        computation only and does not certify complete final-return liability.
