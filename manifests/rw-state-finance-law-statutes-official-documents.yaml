# Rwanda annual State Finance Law capture - STATUTE class (rulespec-rw
# VUP Direct Support higher-authority anchor; tracking rulespec-rw#1).
#
# One primary law:
#
# 1. Law No 066/2024 of 26/06/2024 determining the State Finances for
#    the 2024/2025 Fiscal Year - Article 2 projects the State
#    expenditures for the 2024/2025 fiscal year at FRW
#    5,690,144,278,196 and Article 3 consolidates the State budget;
#    Annex II carries the detailed budget by budget agency, including
#    the social-protection sector support under which LODA/MINALOC
#    funds the VUP Direct Support transfers. The statutory expenditure
#    authority anchoring the administratively-set VUP Direct Support
#    amounts (the Zambia Appropriation Act 2024 capture pattern).
