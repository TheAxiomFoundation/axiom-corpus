      source_note: >-
        Official Gazette no Special of 29/06/2024 (Year 63; 577-page
        text-embedded trilingual print served by the gazettes.africa
        archive facsimile, to which the Rwanda Legal Information
        Institute AKN entry point redirects; host recorded) carrying
        Law No 066/2024 of 26/06/2024 determining the State Finances
        for the 2024/2025 Fiscal Year. Grounds Article 2 (expenditure
        projections): the projected State expenditures for the
        2024/2025 fiscal year are valued at FRW 5,690,144,278,196 (the
        print's own words spell the amount with the original "NINTY"/
        "FOURTY" spellings); Article 3 (consolidated State budget);
        and the Annex II budget-agency detail including the
        social-protection sector support under which LODA/MINALOC
        funds the Vision 2020 Umurenge Programme Direct Support
        transfers. Captured as the statutory higher-authority anchor
        for the policy-class VUP Direct Support encoding: the law
        authorizes the expenditure and prescribes no transfer value,
        which is set administratively by the LODA operational manual
        (the Zambia Appropriation Act 2024 anchoring pattern). The
        fiscal year runs 1 July 2024 to 30 June 2025.
