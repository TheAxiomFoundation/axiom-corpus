      act_number_note: The Assembly Press print reads Act 1134 (THE ONE THOUSAND ONE HUNDRED AND THIRTY-FOURTH ACT). Several published tax alerts (for example EY, March 2025) refer to the same amendment as Act 1129; the print's own act number is recorded here as authoritative. The corpus provision gh/statute/act-1111/... not_superseded_note and the rulespec-gh Act 1111 fixture comment cite the 2025 amendment as Act 1129 following those alerts.
