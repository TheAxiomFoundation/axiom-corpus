      source_family: personal-income-tax/personal-reliefs
      slice_note: Discontiguous page_windows capture from the 182-page image-only GRA print of Act 896 (OCR). Page 41 carries section 51 (personal reliefs enabling rule, window stops before Division II Partnerships); pages 103-111 carry section 133 (interpretation, including the currency point definition of one Cedi); page 133 carries the complete Fifth Schedule (personal reliefs, paragraphs 1-3, original 2015 currency-point amounts). Amounts in Fifth Schedule paragraph 1(a) and (c)-(f) were substituted by the Income Tax (Amendment) Act, 2019 (Act 1007) with effect for 2020 onward; cite those amounts from the Act 1007 provision, not this base text. Paragraph 1(b) disability relief (25 percent of assessable income from business or employment) is unamended base text.
      source_note: Enacted Income Tax Act 2015 (Act 896) PDF hosted by the Ghana Revenue Authority, downloaded 2026-07-06. Image-only print; OCR at 300 dpi. Full-act capture (deferred manifest gh-income-tax-act-896-base-official-documents.yaml) remains available for later ingest; this entry promotes only the reliefs-bearing slices.
