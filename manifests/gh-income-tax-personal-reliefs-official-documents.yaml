      date_of_assent: '2019-12-28'
      gazette_notification_date: '2019-12-30'
      effective_date: '2020-01-01'
      amends: Income Tax Act, 2015 (Act 896), Fifth Schedule paragraph 1 (personal-relief amounts), First Schedule paragraph 1 rate table (superseded by Act 1071 and Act 1111), Sixth Schedule (automotive concession inserted)
      still_in_force_for_year: 2026
      not_superseded_note: No later Income Tax (Amendment) Act amends the Fifth Schedule. Checked on 2026-07-06 against Act 1017 (section 94 only), Act 1066 (Sixth Schedule), Act 1071 (First/Second/Sixth Schedules), Act 1094 (sections plus First/Fourth Schedules), Act 1111 (First Schedule paragraph 1) and Act 1134 (sections 6, 85, 115, 119 and First Schedule paragraph 8). The Act 1007 relief amounts are the amounts in force for the 2026 year of assessment.
      hosting_note: Parliament of Ghana DSpace repository and GRA do not host Act 1007 (checked 2026-07-06); GhaLII hosts the same print at https://ghalii.org/akn/gh/act/2019/1007/eng@2019-12-30/source.pdf behind bot protection that blocks non-interactive capture. This capture uses a faithful scan of the Assembly Press print from the Sage HR Africa payroll-compliance document library. Authenticity features on the face of the print - the act-number recital (THE ONE THOUSAND AND SEVENTH ACT), date of assent 28 December 2019 and Gazette notification 30 December 2019 - match the GhaLII catalogue record and the judy.legal AKN record for Act 1007.
      completeness_note: Two-page scan carrying the complete operative text (long title, sections 1-3, assent and gazette date lines). The arrangement-of-sections cover page of the print is not included in the scan.
      source_family: personal-income-tax/personal-reliefs
      source_note: 'Section 2 substitutes the Fifth Schedule paragraph 1 amounts: paragraph 1(a) marriage/responsibility relief two hundred to one thousand two hundred currency points; 1(c) old-age relief two hundred to one thousand five hundred currency points; 1(d) child-education relief two hundred to six hundred currency points per child or ward (maximum three unchanged); 1(e) aged-dependant-relative relief one hundred to one thousand currency points (maximum two dependants unchanged); 1(f) professional/technical/vocational training relief cap four hundred to two thousand currency points. Paragraph 1(b) disability relief (25 percent of assessable income) is not amended. Cross-checked against the GRA Personal Tax Relief surface (GH¢1,200 / GH¢1,500 / GH¢600 / GH¢1,000 / GH¢2,000 / 25 percent) on 2026-07-06.'
