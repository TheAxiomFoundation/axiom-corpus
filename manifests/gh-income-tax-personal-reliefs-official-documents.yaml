# Ghana personal-reliefs source capture (rulespec-gh second slice).
#
# Three documents ground the current (2026) Fifth Schedule personal reliefs:
#
# 1. Income Tax Act, 2015 (Act 896) base slices — section 51 (the enabling
#    deduction rule for resident individuals), section 133 (the
#    "currency point means one Cedi" definition the relief amounts are
#    denominated in), and the Fifth Schedule (relief conditions and the
#    original 2015 currency-point amounts later substituted by Act 1007).
#    Captured from the GRA-hosted 182-page image-only print via discontiguous
#    page_windows so one source snapshot serves all three slices.
# 2. Income Tax (Amendment) Act, 2019 (Act 1007) — section 2 substitutes the
#    Fifth Schedule paragraph 1 amounts and sets the amounts in force for
#    2026: 1,200 / 1,500 / 600 / 1,000 / 2,000 currency points; the
#    disability relief (25% of assessable income, paragraph 1(b)) is not
#    amended. Assembly Press print scan; see the entry metadata for the
#    hosting note (Parliament DSpace and GRA do not host Act 1007).
# 3. Income Tax (Amendment) Act, 2025 (Act 1134) — the most recent amendment
#    to Act 896 as of 2026-07-06. Amends sections 6, 85, 115, 119 and First
#    Schedule paragraph 8 (withholding) only, so it documents that neither
#    the Fifth Schedule reliefs nor the First Schedule paragraph 1(1) bands
#    changed for 2026.
#
# Fifth Schedule supersession diligence (2015 -> 2026), checked against the
# arrangement of sections or full text of every Income Tax (Amendment) Act
# located on Parliament DSpace or GRA hosting on 2026-07-06:
#   Act 1017 (2020): section 94 only. Act 1066 (2021): Sixth Schedule only.
#   Act 1071 (No. 2, 2021): First/Second/Sixth Schedules. Act 1094 (2023):
#   sections 2A-133 items plus First/Fourth Schedules. Act 1111 (No. 2,
#   2023): First Schedule paragraph 1 substitution only (in corpus at
#   gh/statute/act-1111/...). Act 1134 (2025): captured below. No 2022 or
#   2024 Income Tax (Amendment) Act exists (the Dec-2021 acts 1071-1073
#   carried the "2022 amendments"); no post-1134 amendment found as of
#   2026-07-06. Act 1007's substitution targets quote the base 2015
#   paragraph 1 amounts verbatim, which independently confirms paragraph 1
#   was not restructured between 2015 and 2019.
