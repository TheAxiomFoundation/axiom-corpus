      source_note: >-
        Official tax-year-2026 IT-540ESi estimated-tax instructions and
        worksheet. Page 2 publishes Louisiana estimated standard deductions
        of $12,875 for single and married-filing-separately filers and $25,750
        for married-filing-jointly, head-of-household, and qualifying surviving
        spouse filers. The worksheet subtracts estimated exempt income and the
        filing-status deduction from estimated federal adjusted gross income,
        then multiplies estimated Louisiana taxable income by 3%. It directs
        taxpayers to use the 2025 Form IT-540 and instructions as a guide and
        refers to estimated 2025 credits without supplying their rules. This
        source supports the 2026 estimated-tax worksheet only and does not
        certify a complete final tax-year-2026 resident return.
