    metadata:
      primary_source: true
      source_authority: Republic of Rwanda (Transitional National Assembly; promulgated by the President)
      publisher: Rwanda Social Security Board document library (English print)
      source_family: social-security/occupational-hazards
      source_note: >-
        Rwanda Social Security Board library English print of Law No
        06/2003 of 22/03/2003 modifying and completing the Decree-Law of
        22 August 1974 concerning organization of social security
        (18-page text-embedded print; the administering institution's
        own reproduction, host recorded). Grounds Article 10 (modifying
        Article 14 of the Decree-Law): contributions for the branch of
        pensions are shared out equally between the employee and the
        employer, and contributions for the branch of occupational
        hazards are exclusively paid by the employer; and Article 9
        (modifying Article 13): the percentage rates of contributions
        are fixed by Presidential Decree. The occupational-hazards
        rate-fixing decree itself is not publicly digitized; the 2
        percent employer rate RWAMOD RW_2025 applies is documented only
        by the RSSB scheme administration (the model's own citation), so
        the rate is handled as a documented parity disposition rather
        than an encoded value.
