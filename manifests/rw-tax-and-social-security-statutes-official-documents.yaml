        employee's basic salary, shared out with the employer paying
        7.5 percent and the employee paying the remaining 7.5 percent
        (plus the 15 percent moderating fee on services, not a payroll
        contribution). RAMA is administered by RSSB since the 2010
        merger; RWAMOD RW_2025 applies 7.5 + 7.5 percent to formal
        public-sector employees and 7.5 percent to pensioners on their
        pension income.
