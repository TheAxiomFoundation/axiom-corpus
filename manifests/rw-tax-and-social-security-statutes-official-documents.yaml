# Rwanda direct-tax, consumption-tax and social-insurance capture -
# STATUTE class (rulespec-rw core instruments; RWAMOD PAYE, presumptive,
# rental, contribution, VAT and excise parity; tracking rulespec-rw#1).
#
# Eleven primary laws that ground the operative rate schedules and
# charging provisions the Rwanda encoding depends on:
#
# 1. Law No 027/2022 of 20/10/2022 establishing taxes on income - the
#    PAYE monthly schedules in Article 56 (Table 1 for the first year
#    following commencement: 0/20/30 percent at 60,000/100,000; Table 2
#    from the second year: 0/10/20/30 percent at 60,000/100,001/200,001),
#    the casual-labourer 15 percent special rate with the first 60,000
#    FRW per month at zero percent, the Article 8 calendar-year tax
#    period, the micro-enterprise flat lump-sum table (60,000/120,000/
#    210,000/300,000 FRW for annual turnover 2,000,001-12,000,000), the
#    small-enterprise 3 percent lump-sum on annual turnover (definitions:
#    small business 12,000,001-20,000,000 FRW; micro-enterprise at or
#    under 12,000,000), the Article 21 agricultural/livestock exemption
#    up to 12,000,000 FRW turnover, and Article 73 commencement on
#    publication (Official Gazette no Special of 28/10/2022).
# 2. Law No 048/2023 of 05/09/2023 determining the sources of revenue
#    and property of decentralised entities - rental income tax:
#    Article 42 rates (0 percent to 180,000 FRW annual rental income;
#    20 percent from 180,001 to 1,000,000; 30 percent above 1,000,000)
#    and Article 43 taxable base (gross rental income minus 50 percent
#    deemed maintenance expenses). Captured via the full Official
#    Gazette no Special of 14/09/2023 print, which carries Laws
#    048/2023, 049/2023, 050/2023 and 051/2023.
# 3. Law No 049/2023 of 05/09/2023 on value added tax - Article 4 rate
#    (zero percent for zero-rated supplies; 18 percent otherwise).
# 4. Law No 011/2025 of 27/05/2025 on excise duty - the schedule rows
#    RWAMOD RW_2025 applies (cigarettes 36 percent of retail price of a
#    pack of 20 rods plus FRW 230 per pack; local wines/beers/spirits
#    with at least 70 percent local raw material 40/40/60 percent and
#    other wines/beers/brandies 70/65/70 percent; soft drinks; juices;
#    water; premium fuel FRW 183 per litre and gas oil FRW 150 per
#    litre; lubricants; vehicles; airtime and telecom; chocolates;
#    chewing gum; electronic cigarettes and cartridges; cigars;
#    cosmetics). Replaces Law No 050/2023 (whose cigarette row was 36
#    percent plus FRW 130 and local wine 30 percent), which the RW_2025
#    model year does not use.
# 5. Law No 05/2015 of 30/03/2015 governing the organisation of pension
#    schemes - the equal employer/employee sharing of the mandatory
#    pension contribution and the Article 8 delegation of the rate to a
#    Presidential Order.
# 6. Law No 003/2016 of 30/03/2016 establishing and governing the
#    maternity leave benefits scheme - Article 7: contribution 0.6
#    percent of salary, employer and employee each 0.3 percent.
# 7. Law No 24/2001 of 27/04/2001 establishing RAMA (consolidated print
#    including Law No 29/2002 modifications) - Article 44: contribution
#    15 percent of basic salary shared 7.5 percent employer / 7.5
#    percent employee.
# 8. Law No 03/2015 of 02/03/2015 governing the organisation of the
#    community-based health insurance scheme - the delegation of
#    contribution amounts and payment modalities to Orders (grounds the
#    CBHI premium and employee-levy regulation captures).
# 9. Law No 036/2022 of 09/12/2022 establishing Military Medical
#    Insurance - the current establishing law, deferring contribution
#    rates to a Prime Minister's Order (not publicly digitized).
# 10. Law No 23/2005 of 12/12/2005 establishing MMI - Article 30:
#    monthly subscription 22.5 percent of basic salary; for a soldier
#    the government contributes 17.5 percent and the insured 5 percent.
#    The gazetted primary carrier of the MMI rate split RWAMOD applies.
# 11. Law No 06/2003 of 22/03/2003 modifying the Decree-Law of 22
#    August 1974 organizing social security - Article 10 (modifying
#    Article 14): pension contributions shared equally; occupational
#    hazards contributions exclusively paid by the employer; Article 9
#    (modifying Article 13): rates fixed by Presidential Decree. The
#    occupational-hazards rate decree itself is not publicly digitized.
#
# RWAMOD comparison notes (targets, never sources): RWAMOD RW_2025
# applies the Table 2 PAYE schedule, the lump-sum flat amounts and 3
# percent arm, the 50-percent rental base with 0/20/30 bands, 6+6
# percent pension, 0.3+0.3 percent maternity, 7.5+7.5 percent RAMA,
# 5+17.5 percent MMI, 2 percent employer occupational hazards, 18
# percent VAT and the 2025 excise schedule; these captures are the
# grounded primary instruments those targets are checked against.
