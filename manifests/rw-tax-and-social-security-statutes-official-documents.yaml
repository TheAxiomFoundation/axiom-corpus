      source_family: income-tax/schedules-and-rates
      source_note: >-
        Official Gazette no Special of 28/10/2022 print of Law No 027/2022
        of 20/10/2022 establishing taxes on income, served by the Rwanda
        Revenue Authority document library (text-embedded trilingual
        print; the English column is citable). Grounds: Article 56
        withholding tax on employment income with Table 1 ("First year
        following the date of commencement of this law": 0-60,000 FRW at
        0 percent, 60,001-100,000 at 20 percent, 100,001 and more at 30
        percent) and Table 2 ("From the second year after the
        commencement of this law": 0-60,000 at 0 percent, 60,001-100,000
        at 10 percent, 100,001-200,000 at 20 percent, 200,001 and more
        at 30 percent) plus the casual-labourer special rate of fifteen
        percent with income not exceeding 60,000 FRW per month rated at
        zero percent; Article 8 tax period (calendar year, 1 January to
        31 December); the micro-enterprise flat lump-sum table (annual
        turnover 2,000,000-4,000,000 FRW pays 60,000; 4,000,001-7,000,000
        pays 120,000; 7,000,001-10,000,000 pays 210,000;
        10,000,001-12,000,000 pays 300,000) and the small-enterprise
        lump-sum of three percent of annual turnover, with the
        definitions fixing small business turnover between 12,000,001
        and 20,000,000 FRW and micro-enterprise at or below 12,000,000;
        Article 21 exemption for agricultural or livestock turnover not
        exceeding 12,000,000 FRW in a tax period (with the excess-only
        inclusion rule); and Article 73 commencement on publication in
        the Official Gazette. The 2023 amendment (Law No 051/2023)
        touches declaration timing and the corporate rate only, and the
        27 May 2025 tax package left these brackets unamended, so the
        Table 2 schedule stands for CY2025.
