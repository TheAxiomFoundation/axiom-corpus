        least 70 percent local raw material at 40 percent and other
        wines at 70 percent (of the value of a litre not exceeding FRW
        40,000); brandies/liquors/whisky with the local-content split
        (60 percent local, 70 percent other); beer with at least 70
        percent local raw material at 40 percent and other beers at 65
        percent; soft drinks/sodas; juices; mineral and other bottled
        water; premium fuel (excluding benzene) at FRW 183 per litre and
        gas oil at FRW 150 per litre; lubricants; motor vehicles by
        engine-capacity class; airtime/telephone and internet-telecom
        services at 12 percent; chocolates and chewing gum per
        kilogramme; electronic cigarettes per unit and e-liquid
        cartridges; cigars at 160 percent; and beauty/make-up
        cosmetics. Article 18 repeals Law No 050/2023 of 05/09/2023
        (whose corresponding rows carried 36 percent plus FRW 130 per
        pack for cigarettes and 30 percent for local wine) and Article
        19 brings the law into force on publication (Official Gazette
        no Special of 29/05/2025); the model's values match the 2025
        schedule, so effective dating follows this print.
