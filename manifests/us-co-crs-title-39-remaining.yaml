      source_scope_note: >-
        C.R.S. 2025 Title 39 (Taxation), all articles other than Article 22
        (already published as 2026-07-12-crs-2025-title-39-article-22), from
        the official OLLS uncertified-printout title download (olls.info),
        current through the First Extraordinary Session of the 75th General
        Assembly (August 2025). Completes full-title coverage: property tax
        (arts. 1-14), procedure (21), estate (23.5), sales and use (26), fuel
        (27), cigarette/tobacco/marijuana/nicotine (28-28.8), severance (29),
        enterprise zones (30), PTC rebate (31), and remaining credit articles.
        Fully repealed articles (3.9, 4.1, 23, 25, 26.1, 28.7, 34, 35) appear
        in the source only as ranged headings ("39-25-101 to 39-25-120.
        (Repealed)") and are carried as single empty repealed records under
        the range-start section number. Sections publish under
        us-co/statute/39/<section>.
