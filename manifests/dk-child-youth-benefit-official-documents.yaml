      title_short: LBK nr 603 af 12/05/2025
      title_alternative: Børne- og ungeydelsesloven
      document_type: lovbekendtgørelse (consolidated act)
      in_force: true
      date_document: '2025-05-12'
      date_publication: '2025-06-02'
      consolidates_note: >-
        Consolidation of lov om en børne- og ungeydelse, jf. lovbekendtgørelse
        nr. 724 af 25. maj 2022, with amendments from § 2 of lov nr. 1389 af
        5. oktober 2022, § 44 of lov nr. 753 af 13. juni 2023, § 6 of lov nr.
        174 af 27. februar 2024, § 4 of lov nr. 482 af 22. maj 2024, § 4 of
        lov nr. 632 af 11. juni 2024, and § 8 of lov nr. 665 af 11. juni 2024
        (per the consolidation preamble).
      amended_after_consolidation_note: >-
        Two later amendment acts exist (per the retsinformation ELI
        changed_by graph, checked 2026-07-12). (1) LOV nr 1642 af 16/12/2025
        (ingested alongside this document, source_id
        dk-lov-1642-2025-aendringslov): its § 1, nr. 1 changes § 1, stk. 3,
        7. pkt. rounding divisor »12« to »24«; nr. 2-11 change § 2, stk. 1,
        nr. 10, § 4 (payout rules) and § 11, stk. 2. It does NOT change the
        § 1, stk. 1-2 base amounts or the § 1 a income taper. (2) LOV nr 303
        af 24/02/2026 changes § 4 e, stk. 1 and 4 (»3 år« to »5 år«) and
        inserts new sections after § 4 e in kapitel 3; it does not touch
        § 1 or § 1 a. Encodings of § 1, stk. 1-2 and § 1 a from this
        consolidation therefore remain current statutory text as of
        2026-07-12; encodings of the § 1, stk. 3 rounding step must apply
        the LOV nr 1642 amendment.
      source_family: child-benefit
      source_note: >-
        Official retsinformation.dk PDF manifestation (ELI legal value:
        definitive), downloaded 2026-07-12 from the stable ELI format URL.
        Text-embedded PDF, no OCR needed; Danish text (æ/ø/å) extracts
        cleanly. Key provisions for encoding: § 1, stk. 1 sets the tax-free
        børneydelse at 16.992 kr. annually (2011-niveau) for children under
        3, 13.452 kr. (2011-niveau) for ages 3-6, and 10.584 kr.
        (2011-niveau) for ages 7-14; § 1, stk. 2 sets the ungeydelse for
        ages 15-17 at 10.584 kr. annually (2011-niveau); § 1, stk. 3 indexes
        these amounts to the Danmarks Statistik consumer price index
        relative to the 2009 index (annual average two years prior), with
        the computed percentage reduced 1.9 points for 2012 and 3.9 points
        from 2013 onward, one-decimal precision, rounding to the nearest
        krone amount divisible by 12 (24 after LOV nr 1642 af 16/12/2025),
        plus a further 660 kr. total uplift in 2023; § 1 a, stk. 1 reduces
        the combined benefit by 2 pct. of the recipient's mellemskat income
        base (personskattelovens § 7, stk. 1 og 3) above a bundfradrag of
        700.000 kr. (2010-niveau); § 1 a, stk. 3 regulates the bundfradrag
        per personskattelovens § 20; § 1 a, stk. 4-5 deduct grossed-up
        (divide by 0,6) aldersforsikring/aldersopsparing/supplerende
        engangssum contributions capped at the pensionsbeskatningslovens
        § 16, stk. 1 grundbeløb.
