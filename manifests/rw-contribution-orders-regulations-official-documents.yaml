      commencement_date: '2026-02-23'
      source_family: social-security/cbhi
      source_note: >-
        Official Gazette no Special of 23/02/2026 (Year 65; 25-page
        text-embedded trilingual print served by the gazettes.africa
        archive facsimile, to which the Rwanda Legal Information
        Institute AKN entry point redirects; host recorded) carrying
        two CBHI instruments
        issued under Law No 03/2015: Prime Minister's Order No 001/03
        of 16/02/2026 on funding and contributions (Article 17 repeals
        Prime Minister's Order No 105/03 of 30/09/2020; entry into
        force on publication) and Ministerial Order No 002/26/10/TC of
        16/02/2026 determining the amount of contribution and
        modalities for payment (Article One: a member registered at
        IMIBEREHO Dynamic Social Registry level one pays FRW 4,000 per
        person per year paid by the State; level two pays FRW 3,000
        plus FRW 1,000 by the State; level three FRW 5,000; level four
        FRW 8,000; level five FRW 20,000; Article 5 entry into force on
        publication 23/02/2026). This is the first gazetted carrier of
        the informal-sector premium schedule that RWAMOD RW_2025
        already applies by monthly-income tier (3,000 to 30,000 FRW;
        5,000 to 60,000; 8,000 to 120,000; 20,000 above) - the
        income-tier practice ran from 2024 under RSSB administration
        while the gazetted instrument dates to February 2026, a
        validation-year grounding gap recorded as a parity finding
        rather than back-dated in the encoding.
