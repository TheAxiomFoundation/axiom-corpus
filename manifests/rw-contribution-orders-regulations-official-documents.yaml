      publisher: Official Gazette of the Republic of Rwanda; Rwanda Legal Information Institute (Laws.Africa) AKN source facsimile
      commencement_date: '2020-10-01'
      source_family: social-security/cbhi
      source_note: >-
        Rwanda Legal Information Institute (rwandalii.org, Laws.Africa
        AKN mirror) source PDF of Prime Minister's Order No 105/03 of
        30/09/2020 related to the community-based health insurance
        scheme contributions (7-page text-embedded print; mirror host
        recorded; gazetted 01/10/2020), issued under Law No 03/2015.
        Grounds Article 5: the contribution of an employee in a State
        organ and of an employee in the private sector is zero-point
        five percent (0.5%) of the net salary of the employee, withheld
        by the employer and deposited to the CBHI scheme account, with
        monthly declaration and payment; also carries the scheme's
        funding-source schedule (Article 3) including the Ubudehe
        category E State-paid premiums of the pre-2026 framework. In
        force throughout CY2025; repealed with effect from 23/02/2026
        by Prime Minister's Order No 001/03 of 16/02/2026 (captured
        alongside). RWAMOD RW_2025 applies the 0.5 percent levy on net
        salary for formal employees (tsceehl03).
