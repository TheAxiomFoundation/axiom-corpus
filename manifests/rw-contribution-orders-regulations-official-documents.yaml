# Rwanda contribution-rate and contribution-base orders - REGULATION
# class (rulespec-rw social-insurance instruments; RWAMOD pension,
# maternity-base, CBHI parity; tracking rulespec-rw#1).
#
# Four implementing orders under the captured statutes:
#
# 1. Presidential Order No 086/01 of 12/12/2024 fixing the contribution
#    rate for the mandatory pension scheme - Article One: 12 percent
#    from 1 January 2025 (then 14 percent from 2027, 16 from 2028, 18
#    from 2029, 20 from 2030); Article 5 repeals Presidential Order No
#    009/01 of 10/05/2016; Article 6 entry into force on publication
#    (Official Gazette no Special of 13/12/2024). Under the
#    equal-sharing rule of Law No 05/2015 this is the 6 percent
#    employee + 6 percent employer split RWAMOD RW_2025 applies.
# 2. Prime Minister's Order No 105/03 of 30/09/2020 related to the
#    community-based health insurance scheme contributions - the
#    employee contribution of 0.5 percent of net salary (State-organ
#    and private-sector employees), withheld by the employer; the
#    CBHI funding-source schedule. In force throughout CY2025; repealed
#    23/02/2026 by Prime Minister's Order No 001/03 of 16/02/2026.
# 3. Official Gazette no Special of 23/02/2026 carrying Prime
#    Minister's Order No 001/03 of 16/02/2026 (CBHI funding and
#    contributions; repeals Order No 105/03 of 30/09/2020) and
#    Ministerial Order No 002/26/10/TC of 16/02/2026 determining the
#    amount of contribution and modalities for payment under the CBHI
#    scheme - Article One: member premiums by IMIBEREHO Dynamic Social
#    Registry level (level 1: FRW 4,000 paid by the State; level 2:
#    FRW 3,000 plus FRW 1,000 by the State; level 3: FRW 5,000;
#    level 4: FRW 8,000; level 5: FRW 20,000 per person per year);
#    entry into force on publication. The first gazetted carrier of the
#    tier schedule RWAMOD RW_2025 already applies by income tier - the
#    validation-year grounding gap is a documented parity finding.
# 4. Ministerial Order No 007/16/10/TC of 28/10/2016 related to the
#    maternity leave benefits scheme - the components of the gross
#    salary to which the maternity contribution is subscribed
#    (Official Gazette no 44 of 31/10/2016).
