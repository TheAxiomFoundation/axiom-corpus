      commencement_date: '2024-12-13'
      source_family: social-security/pension-contributions
      source_note: >-
        Rwanda Social Security Board library print of the Official
        Gazette no Special of 13/12/2024 carrying Presidential Order No
        086/01 of 12/12/2024 fixing the contribution rate for the
        mandatory pension scheme (6-page text-embedded trilingual
        print), issued under Article 8 of Law No 05/2015. Grounds
        Article One: the rate of contribution under the mandatory
        pension scheme is fixed at 12 percent of the remuneration
        subject to contribution from 1 January 2025, then 14 percent
        from 1 January 2027, 16 percent from 2028, 18 percent from 2029
        and 20 percent from 2030; Article 5 repeals Presidential Order
        No 009/01 of 10/05/2016 (the prior 6 percent total); Article 6
        entry into force on publication. Under the equal
        employer/employee sharing rule of Law No 05/2015, the 12
        percent total is the 6 + 6 percent split RWAMOD RW_2025
        applies to formal employment income.
