# Ghana transfer-programme capture (rulespec-gh transfers tranche, GHAMOD
# bsa_gh / bed_gh / bedes_gh parity).
#
# These are administratively-set programmes (gh/policies in the rules
# repo); the promoted sources are official Government of Ghana documents:
# 1. LEAP grant amounts: the Ministry of Gender, Children and Social
#    Protection's 97th-payment-cycle announcement states the bi-monthly
#    cash grants in force from the June 2025 indexation — GH¢320 (one
#    eligible member), GH¢380 (two), GH¢440 (three), GH¢530 (four or
#    more) per two-month cycle. GHAMOD GH_2025 codes the same numbers as
#    MONTHLY amounts — a 2x divergence candidate recorded in
#    rulespec-gh#10.
# 2. School feeding: the 2025 Budget Statement and Economic Policy
#    (paragraph 381) states the feeding cost "per meal per child per day
#    from GH¢1.50 to GH¢2.00" — the GH¢2.00/day in force from 2025,
#    matching GHAMOD's constant exactly. Paragraph 386 carries the LEAP
#    indexation and allocation corroboration.
# 3. Free SHS: paragraphs 376-379 of the same 2025 Budget Statement pages
#    carry the Free SHS funding structure (GETFund uncapping for full
#    funding of fee-free public SHS). No official public per-student
#    subsidy schedule exists; GHAMOD's per-year amounts (1,002.47
#    residential / 648.47 day) have no located official basis (searched
#    MoE, Free SHS Secretariat, budget statements 2026-07-07; moe.gov.gh
#    serves a self-signed certificate) — recorded as a finding candidate;
#    the rules module encodes the fee-free structure and defers amounts.
