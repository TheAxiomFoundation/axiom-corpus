      source_family: social-security/psssf-contributions
      source_note: >-
        Ministry of Labour library print of the Public Service Social
        Security Fund Act, 2018 (No. 2 of 2018; 69-page text-embedded
        print; the file name carries a stray _sw suffix but the text
        is the English Act). Grounds section 18: a contribution
        payable to the Fund by the employer at the rate of twenty
        percentum of the employee's monthly salary, constituted by
        five percentum deducted from the member's salary and fifteen
        percentum contributed by the employer, with the employee share
        capped at fifty percent of the total. TAZMOD TZ_2023 applies
        exactly this 5 + 15 split to public servants.
