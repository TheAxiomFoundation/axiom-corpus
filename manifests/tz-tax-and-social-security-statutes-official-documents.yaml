        resident individual annual table (nil where total income does
        not exceed 3,240,000 shillings; 8 percent of the excess to
        6,240,000; 240,000 plus 20 percent to 9,120,000; 816,000 plus
        25 percent to 12,000,000; 1,536,000 plus 30 percent above),
        the paragraph 2 presumptive regime (conditions including the
        independent-professions carve-out; the 100,000,000 threshold;
        the FA2022 table with the incomplete-records flat amounts
        100,000/250,000, the with-records 3 percent arms and the 3.5
        percent of turnover band for 11,000,001 to 100,000,000), and
        the charging and employment-income provisions (sections 4 and
        7). The rate history: the thresholds date to the Finance Act
        2020 and the 8 percent second band to the Finance Act 2021
        (both captured alongside for dating).
