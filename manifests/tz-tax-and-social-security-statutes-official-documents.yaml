# Tanzania (mainland) direct-tax, social-insurance and consumption-tax
# capture - STATUTE class (rulespec-tz core instruments; TAZMOD TZ_2023
# parity; tracking rulespec-tz#1).
#
# Ten primary instruments. The validation state is the TAZMOD TZ_2023
# system (point-in-time 1 July 2023 per the model's own convention):
#
# 1. Income Tax Act (Cap. 332, R.E. 2023) - First Schedule paragraph
#    1(1) resident individual annual table (nil to 3,240,000; 8%;
#    240,000 + 20%; 816,000 + 25%; 1,536,000 + 30% above 12,000,000)
#    and paragraph 2 presumptive regime (threshold 100,000,000; the
#    FA2022 table: nil to 4,000,000; 3% of excess with records or flat
#    100,000 without; 90,000 + 3% or flat 250,000; 3.5 percent of
#    turnover for 11,000,001-100,000,000); sections 4 and 7.
# 2. Finance Act, 2021 (No. 3) - section 25 substitutes the individual
#    table (second band 9 to 8 percent, in force from 1 July 2021 -
#    the schedule TAZMOD TZ_2023 applies); sections 42-43 raise the
#    Road and Fuel Tolls Act (Cap. 220) fuel toll to 413 per litre;
#    section 11 restructures the spirits heading 22.08 (local 3,978,
#    imported 4,386).
# 3. Finance Act, 2022 (No. 5) - section 72 substitutes the
#    presumptive paragraph 2 table and carves out independent
#    professions; Part IX adds excise items without changing the
#    modelled rows.
# 4. Finance Act, 2023 (No. 7) - section 10 uplifts the excise rows
#    (beer 918 per litre; cigarettes 35,310 per mille; other tobacco
#    33,878.88 per kg) and sections 50-51 raise the fuel toll to 513
#    per litre, all commencing 1 July 2023 - the rates TAZMOD TZ_2023
#    applies under its 1-July convention.
# 5. National Social Security Fund Act (Cap. 50, R.E. 2023) - section
#    12 and the First Schedule contribution table (statutory
#    contribution twenty cents for every complete shilling of wages =
#    20 percent, with the employer's-share-deductible-from-wages ten
#    cents = the 10 percent employee share). TAZMOD applies 5 + 5
#    percent - a recorded parity finding.
# 6. Public Service Social Security Fund Act, 2018 (No. 2) - section
#    18: employer pays 20 percent of monthly salary, constituted by 5
#    percent deducted from the member and 15 percent from the
#    employer.
# 7. National Health Insurance Fund Act (Cap. 395, R.E. 2023) -
#    section 9: employer 3 percent + a matching 3 percent employee
#    contribution.
# 8. Value Added Tax Act (Cap. 148, R.E. 2023) - section 5(1):
#    eighteen percent.
# 9. Excise (Management and Tariff) Act (Cap. 147, R.E. 2019) - the
#    Fourth Schedule base rows the Finance Acts amend (wine "other"
#    2,466.45 per litre; petrol excise 379 and gas oil 255 per litre;
#    cigars 30 percent; the pre-FA2021 spirits and pre-FA2023 beer/
#    cigarette/tobacco figures).
# 10. Income Tax Act (Cap. 332, R.E. 2019) - the superseded
#    consolidation carrying the pre-FA2020 individual table and the
#    original presumptive table, captured for the amendment chain.
#
# TAZMOD comparison notes (targets, never sources): TAZMOD TZ_2023
# applies the FA2021 individual schedule, the FA2022 presumptive table
# (marginally, understating the 3.5 percent whole-turnover band), NSSF
# at half the statutory rate, PSSSF 5+15, NHIF 3+3, VAT 18 percent,
# and the FA2023 excise/fuel figures; wine and spirits values match no
# print. These captures are the grounded primary instruments those
# targets are checked against.
