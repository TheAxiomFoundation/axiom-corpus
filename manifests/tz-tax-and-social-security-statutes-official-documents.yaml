      source_family: social-security/nssf-contributions
      source_note: >-
        National Social Security Fund library print of the NSSF Act
        (Cap. 50, Revised Edition 2023; 50-page text-embedded
        consolidation; the administering institution's own copy of the
        Revised Edition, host recorded). Grounds section 12(1) (the
        employer pays a contribution for every contribution period)
        and the First Schedule contribution table: the statutory
        contribution for each employee is twenty cents for every
        complete shilling of wages (20 percent) of which the
        employer's share deductible from wages is ten cents (the 10
        percent employee share), leaving the employer to fund the
        other 10 percent. TAZMOD TZ_2023 applies 5 percent employee
        plus 5 percent employer - half the statutory rate, a recorded
        parity finding.
