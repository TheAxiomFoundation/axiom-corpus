      source_note: >-
        Ministry of Health library print of the National Health
        Insurance Fund Act (Cap. 395, Revised Edition 2023; 30-page
        text-embedded consolidation). Grounds section 9: an employer
        makes a monthly contribution to the Fund of an equivalency of
        three per centum of the employee's salary, and the Treasury
        deposits the employee's monthly contribution together with
        another three per centum from the employer; section 10 lets
        the Board review the rate subject to regulation. TAZMOD
        TZ_2023 applies 3 + 3 percent to formal employees.
