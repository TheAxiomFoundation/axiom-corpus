      source_note: >-
        LODA publications library print of the VUP Operational Manual -
        Safety Net Components for FY2024/25 (56-page scanned image PDF
        with no embedded text layer, so extraction runs a fresh OCR at
        350 dpi, eng, psm 3, over the whole file as a single block; the
        byte-identical file is also published in the FY2023/24 folder).
        Grounds the Direct Support household entitlement table: number
        of household members 1 pays FRW 7,500; 2 pays 12,000; 3 pays
        15,000; 4 pays 18,000; 5 or more pays 21,000 - monthly
        transfers, framed by the manual's own text on monthly payment
        access. The RWAMOD v2.0 country report (May 2026) states this
        schedule is unchanged as of July 2025, so it stands for the
        CY2025 validation year. VUP Direct Support is administrative
        (LODA/MINALOC); no gazetted instrument fixes the schedule.
        Flag: scanned print, fresh 350 dpi OCR.
