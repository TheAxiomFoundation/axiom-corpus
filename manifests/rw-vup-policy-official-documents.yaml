# Rwanda social-protection programme rules - POLICY class (rulespec-rw
# transfer instruments; RWAMOD VUP Direct Support parity; tracking
# rulespec-rw#1).
#
# One official programme document:
#
# 1. VUP Operational Manual - Safety Net Components (LODA, FY2024/25) -
#    the Direct Support household-entitlement schedule (monthly, by
#    household size: 1 member FRW 7,500; 2 members 12,000; 3 members
#    15,000; 4 members 18,000; 5 or more 21,000), unchanged as of July
#    2025 per the RWAMOD v2.0 country report. VUP Direct Support is set
#    administratively by LODA/MINALOC rather than by law or order, so
#    the operational manual is the governing programme instrument (the
#    same pattern as the Zambia MCDSS Social Cash Transfer capture).
#    The print is a scanned image PDF, so extraction runs a fresh OCR.
#
# RWAMOD comparison notes (targets, never sources): RWAMOD RW_2025
# simulates VUP Direct Support with exactly this household-size
# schedule, gated on reported receipt, consumption poverty and
# labour-constraint tests; the capture grounds the amounts.
