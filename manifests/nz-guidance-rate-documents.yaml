documents:
  - source_id: nz-ird-how-kiwisaver-works
    jurisdiction: nz
    document_class: guidance
    title: Inland Revenue — How KiwiSaver works (contribution rates and government contribution)
    source_url: https://www.ird.govt.nz/kiwisaver/kiwisaver-individuals/how-kiwisaver-works
    source_format: html
    source_as_of: '2026-07-20'
    citation_path: nz/guidance/ird/how-kiwisaver-works
    metadata:
      primary_source: true
      source_authority: Inland Revenue
      source_family: kiwisaver
      source_status: official_current_rate_guidance_after_statute_locator
      source_note: >
        Official Inland Revenue guidance stating the employee contribution
        rates (3.5%, 4%, 6%, 8%, 10%) and the annual government contribution
        maximum ($260.72). Statutory bases are KiwiSaver Act 2006 ss 64,
        101B, 101D and Taxation (Budget Measures) Act 2025 ss 13, 20, 22;
        this page corroborates the operative amounts.
  - source_id: nz-ird-kiwisaver-government-contribution
    jurisdiction: nz
    document_class: guidance
    title: Inland Revenue — Getting the KiwiSaver government contribution
    source_url: https://www.ird.govt.nz/kiwisaver/kiwisaver-individuals/growing-my-kiwisaver-account/getting-the-kiwisaver-government-contribution
    source_format: html
    source_as_of: '2026-07-20'
    citation_path: nz/guidance/ird/kiwisaver-government-contribution
    metadata:
      primary_source: true
      source_authority: Inland Revenue
      source_family: kiwisaver
      source_status: official_current_rate_guidance_after_statute_locator
      source_note: >
        Official Inland Revenue guidance stating the member-contribution
        threshold ($1,042.86 between 1 July and 30 June) for the maximum
        government contribution ($260.72, 25 cents per dollar). Statutory
        base is KiwiSaver Act 2006 Schedule 1 as amended by Taxation
        (Budget Measures) Act 2025 s 13.
  - source_id: nz-employment-parental-leave-payments
    jurisdiction: nz
    document_class: guidance
    title: Employment New Zealand — Parental leave payments
    source_url: https://www.employment.govt.nz/pay-and-hours/pay-and-wages/leave-and-holiday-pay/parental-leave-payments
    source_format: html
    source_as_of: '2026-07-20'
    citation_path: nz/guidance/employment-nz/parental-leave-payments
    metadata:
      primary_source: true
      source_authority: Employment New Zealand (MBIE)
      source_family: parental-leave
      source_status: official_administering_agency_guidance
      source_note: >
        Official Employment New Zealand guidance on parental leave payments,
        including transfer of entitlement between eligible parents.
        Statutory bases are Parental Leave and Employment Protection Act
        1987 s 71B ff and the Parental Leave and Employment Protection
        Regulations 2016.
  - source_id: nz-employment-ppl-rate-increase-2026
    jurisdiction: nz
    document_class: guidance
    title: Employment New Zealand — Parental leave payments to increase from 1 July (2026)
    source_url: https://www.employment.govt.nz/news-and-updates/parental-leave-payments-to-increase-from-1-july
    source_format: html
    source_as_of: '2026-07-20'
    citation_path: nz/guidance/employment-nz/parental-leave-payment-increase-2026
    metadata:
      primary_source: true
      source_authority: Employment New Zealand (MBIE)
      source_family: parental-leave
      source_status: official_administering_agency_rate_notice
      source_note: >
        Official announcement of the 1 July 2026 adjustment of the maximum
        weekly rate of parental leave payment from $788.66 to $811.05 under
        the Parental Leave and Employment Protection Act 1987 annual
        adjustment mechanism (s 71M).
  - source_id: nz-employment-ppl-rate-increase-2024
