version: "2026-05-27"
document_family: state_snap_policy_sources
program: SNAP
policy:
  canonical_pipeline: source-first
  source_policy: primary_official_only
  durable_artifacts:
    - sources
    - inventory
    - provisions
    - coverage
  forbidden_sources:
    - secondary summaries
    - State Options Reports
    - benefitswiki
    - policy manuals reposted by non-government sites
  notes:
    - This queue covers state/DC SNAP manuals and equivalent primary official SNAP policy sources.
    - Some states publish SNAP policy as administrative regulations rather than a handbook.
    - BenefitsWiki was used only as a discovery lead list; corpus artifacts must cite official primary sources.
