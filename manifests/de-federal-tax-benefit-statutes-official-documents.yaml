    document_class: statute
    slug: estg
    citation_path: de/statute/estg
    title: Einkommensteuergesetz (EStG)
    source_url: 'https://www.gesetze-im-internet.de/estg/xml.zip'
    source_format: gesetze-im-internet.de-juris-xml
    request:
      browser_user_agent: true
    metadata:
      primary_source: true
      source_authority: Bundesministerium der Justiz (juris GmbH)
      jurabk: EStG
      ausfertigung_datum: '1934-10-16'
