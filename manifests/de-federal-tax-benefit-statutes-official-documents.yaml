# Germany (Bund) federal tax and social-benefit statutes captured from the
# official Bundesministerium der Justiz portal gesetze-im-internet.de as
# consolidated juris XML (one xml.zip per law, each holding a single BJNR*.xml
# document). This is the best-case source class: official, consolidated,
# structured, no OCR.
#
# The extract-de-gii converter fetches each law's xml.zip, retains the inner XML
# under sources/ with its sha256, and emits one provision per <norm>:
#   de/<document_class>/<gesetz-slug>            law-level parent (kind=document)
#   de/<document_class>/<gesetz-slug>/<norm>     per-section child (§ N, Anlage N,
#                                                Inhaltsübersicht, weggefallen
#                                                ranges, division headings)
#
# citation_path here is the LAW-LEVEL parent node; the converter appends the
# per-norm slug derived from each norm's <enbez> (or gliederungskennzahl).
# All nineteen slugs below were verified HTTP 200 on 2026-07-16.
#
# source_as_of is deliberately NOT set on live-fetch entries: the converter
# stamps each run with the actual fetch date (a manifest value would relabel
# later re-fetches with a stale date — the org date-field bug class). Offline
# ingests of retained artifacts pass an explicit --source-as-of instead.
#
# HISTORICAL-VERSION CAVEAT: gesetze-im-internet serves only the CURRENT
# consolidation. The lane's validation year is 2025 (rules in force
# 2025-06-30); where a value was amended after that date, the current XML no
# longer states the 2025 wording — ground those from the amending act or the
# BGBl archive (www.recht.bund.de) as separate captures. Known instance:
# Buergergeld-V is being superseded by GrusiGV.
#
# NOT CAPTURABLE HERE: RBSFV 2025 (Regelbedarfsstufen-Fortschreibungs-
# verordnung 2025, essential for 2025 SGB II/XII amounts) — its GII xml.zip
# returns 404; capture from the BGBl 2024 I Nr. 312 archive as an offline
# ingest with explicit source_as_of.
#
# Run (per law group; the ingest wave uses signed manifests):
#   uv run axiom-corpus-ingest extract-de-gii \
#     --base data/corpus \
#     --version <version> \
#     --manifest manifests/de-federal-tax-benefit-statutes-official-documents.yaml
