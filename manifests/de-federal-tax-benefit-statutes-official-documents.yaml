# Germany (Bund) federal tax and social-benefit statutes captured from the
# official Bundesministerium der Justiz portal gesetze-im-internet.de as
# consolidated juris XML (one xml.zip per law, each holding a single BJNR*.xml
# document). This is the best-case source class: official, consolidated,
# structured, no OCR.
#
# The extract-de-gii converter fetches each law's xml.zip, retains the inner XML
# under sources/ with its sha256, and emits one provision per <norm>:
#   de/<document_class>/<gesetz-slug>            law-level parent (kind=document)
#   de/<document_class>/<gesetz-slug>/<norm>     per-section child (§ N, Anlage N,
#                                                Inhaltsübersicht, weggefallen
#                                                ranges, division headings)
#
# citation_path here is the LAW-LEVEL parent node; the converter appends the
# per-norm slug derived from each norm's <enbez> (or gliederungskennzahl). All
# eleven slugs below were verified HTTP 200 today.
#
# Run (per law group; the ingest wave uses signed manifests):
#   uv run axiom-corpus-ingest extract-de-gii \
#     --base data/corpus \
#     --version <version> \
#     --manifest manifests/de-federal-tax-benefit-statutes-official-documents.yaml
