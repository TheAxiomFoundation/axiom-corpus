# Uganda NSSF contribution capture (rulespec-ug instrument 5-6, UGAMOD
# tscee_ug/tscer_ug parity; tracking rulespec-ug#1).
#
# The National Social Security Fund Act (Chapter 230 on the face of the
# revised-edition volume print; Act 8 of 1985, commencement 1 December
# 1985): section 10 requires a contributing employer to pay a STANDARD
# CONTRIBUTION of fifteen percent of the monthly total wages of each
# eligible employee; section 11 lets the employer deduct the EMPLOYEE'S
# SHARE of five percent from the employee's wages (the employer bears
# the remaining ten percent economically - UGAMOD's tscee_s 5% /
# tscer_s 10% split, probed exact); section 12 sets the special
# contribution (ten percent) for employees excepted from the standard
# scheme. The NSSF (Amendment) Act 2021 (print held locally) modernises
# definitions, membership and voluntary provisions and does NOT restate
# the section 10-12 rates.
#
# Source: the Fund's own hosted scan of the revised-edition volume pages
# (running heads "[Cap. 230" with Laws-of-Uganda volume pagination
# 8208-); faithful reproduction of the official revised-edition print,
# accepted per the Ghana Sage-hosted Assembly Press precedent with the
# authenticity features on the face cross-checked (chapter number,
# commencement, volume page numbers).
