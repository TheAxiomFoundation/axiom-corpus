      justel_url: https://www.ejustice.just.fgov.be/eli/decret/2018/04/23/2018202523/justel
      source_authority: Moniteur belge / Belgisch Staatsblad
      source_family: family-benefits-german-speaking-community
      source_status: official_consolidated_article_segmented
      source_note: >-
        German-speaking Community decree of 23 April 2018 on family benefits
        (numac 2018202523), French-language consolidated Justel text, ingested at
        ARTICLE granularity. Justel serves the consolidated (in-force, uprated)
        expression: article 8 the 157-euro base allowance (unchanged), article 17
        the 137,50-euro large-family supplement, article 19 the 77,50-euro social
        supplement, article 21 the seven category supplements
        (87,50/114,50/264,50/434,50/493,50/528,50/563,50 euros), articles 23/25
        the 241,50/122,50-euro orphan supplements, and articles 30/34 the 1 144-
        euro birth/adoption premium. This grounds the current consolidated
        amounts alongside the German-language base (2019) values; the euro
        figures are present as amounts per article rather than only as
        cross-references.
