    metadata:
      legal_authority_url: https://www.ejustice.just.fgov.be/eli/decret/2018/04/23/2018202523/moniteur
      justel_url: https://www.ejustice.just.fgov.be/eli/decret/2018/04/23/2018202523/justel
      source_authority: Moniteur belge / Belgisch Staatsblad
      source_family: family-benefits-german-speaking-community
      source_status: official_original_publication_article_segmented
      source_note: >-
        German-speaking Community decree of 23 April 2018 on family benefits
        (numac 2018202523), German-language original Moniteur publication of 12
        June 2018, re-ingested at ARTICLE granularity so the amount-bearing
        articles carry their euro values as resolved provision text
        (axiom-corpus#205). The prior extract-official-documents ingest collapsed
        the whole German text into one document-level block with the amounts
        stripped; this re-ingest segments on the German "Art. N -"/"Artikel N -"
        headings. Article 8 states the 157-Euro Basiskindergeld, article 15 the
        52-Euro Jahreszuschlag, article 17 the 135-Euro large-family supplement,
        article 19 the 75-Euro Sozialzuschlag, article 21 the seven disability-
        category supplements (85/112/262/432/491/526/561 Euro), articles 23/25
        the 239/120-Euro orphan supplements, and articles 30/34 the 1.144-Euro
        birth/adoption premium — the base (2019) values rulespec-be
        be-dg/statutes/family_benefits/amounts.yaml cites and quotes as German
        spans. This is the German-language authentic expression for the German-
        speaking Community.
