documents:
  - source_id: uk-govuk-national-insurance-rates-and-allowances
    jurisdiction: uk
    document_class: guidance
    title: 'Rates and allowances: National Insurance contributions'
    source_url: https://www.gov.uk/government/publications/rates-and-allowances-national-insurance-contributions/rates-and-allowances-national-insurance-contributions
    source_format: html
    source_as_of: '2026-04-06'
    citation_path: uk/guidance/govuk/national-insurance-rates/rates-and-allowances
    metadata:
      source_authority: HM Revenue and Customs (GOV.UK)
      legal_authority_url: https://www.legislation.gov.uk/ukpga/1992/4/section/13
      upstream_publication_url: https://www.gov.uk/government/publications/rates-and-allowances-national-insurance-contributions
      source_family: national-insurance/rates-and-allowances
      source_note: >-
        Official HMRC guidance page publishing National Insurance contribution
        rates and allowances per tax year, including the Class 3 voluntary
        flat weekly rate (2026 to 2027: GBP 18.40; 2025 to 2026: GBP 17.75).
        Annual re-ratings are made by administrative order and are not
        consolidated into the SSCBA 1992 s.13(1) base text on
        legislation.gov.uk (which still reads GBP 17.75), so this page carries
        the money atoms for Class 3 weekly amounts from 6 April 2026. Page
        last updated 6 April 2026.
