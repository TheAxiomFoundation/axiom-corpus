# Ghana excise-duty and fuel-levy capture (rulespec-gh consumption tranche,
# GHAMOD tex_gh parity: tvl01-07 ad-valorem + per-litre fuel rows).
#
# 1. Excise ad valorem: the Excise Duty (Amendment) (No. 2) Act, 2023
#    (Act 1108, assent + gazette 29 Dec 2023) SUBSTITUTES the whole First
#    Schedule of the Excise Duty Act, 2014 (Act 878) — the substituted
#    table is therefore the complete in-force rate schedule for 2024-2026
#    (no later excise Act exists: the March and December 2025 packages
#    contain none; checked on Parliament DSpace 2026-07-07). Key rows:
#    waters/juices 17.5-20%; malt 10-20% by local raw material; beer 47.5/
#    32.5/10% by local raw material; wines 45%; spirits 50% (akpeteshie
#    20%); cigarettes 50% + 28 pesewas per stick; e-cigarette liquids 50%
#    + 50 pesewas/ml; plastics 5%. Earlier chain (Acts 903/941/1093 etc.)
#    is superseded by the wholesale substitution and recorded as diligence
#    only.
# 2. Fuel levies: the Energy Sector Levies Act, 2025 (Act 1135, assent
#    2 Apr 2025) repeals Act 899 and consolidates the levies; its Schedule
#    is amended by Act 1141 (4 Jun 2025: Energy Sector Shortfall and Debt
#    Repayment Levy to GHp 195 petrol / 193 diesel / 195 naphtha / 24 fuel
#    oil / 23 marine) and Act 1145 (29 Jul 2025: marine restated, Road
#    Fund GHp 48, Energy Fund GHp 1). The 2026 per-litre totals: petrol
#    GHp 244, diesel GHp 242.
#
# GHAMOD comparison notes (targets, never sources): GH_2025 models petrol
# 195 / diesel 193 total (its legacy 1.65+0.20+0.10 split) — the
# consolidated shortfall levy only, omitting Road Fund and Energy Fund
# (~GHp 49/l on road fuels); its kerosene -0.0271/l subsidy and LPG
# 0.5608/l rows do not match the 1135 schedule (kerosene 1 GHp/kg Energy
# Fund; LPG 73 GHp/kg shortfall). Findings recorded in rulespec-gh#10.
