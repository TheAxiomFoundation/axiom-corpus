      source_note: >-
        Authentic Assembly Press printed National Pensions Act, 2008 (Act 766),
        downloaded from the Parliament of Ghana DSpace repository ORIGINAL
        bitstream on 2026-07-07. Text-embedded PDF. Section 3 (Contributions to
        the Scheme) is on print page 11 and continues to the start of Section 4
        on page 12; subsection (1) sets the 5.5% worker contribution, (2) the
        13% employer contribution, (3) the 13.5% first-tier / 5% second-tier
        remittance split of the total 18.5%, and (4) the 18.5%-of-minimum-wage
        floor. Amendment diligence to record at encode time: the National
        Pensions (Amendment) Act, 2014 (Act 883) amended Act 766 but did not
        change the section 3 contribution rates (5.5% / 13% / 18.5% remain the
        current 2026 rates, matching GHAMOD tscee_s and tscer_s).
