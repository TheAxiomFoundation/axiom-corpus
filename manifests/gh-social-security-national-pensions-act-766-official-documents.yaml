# Ghana social-security contribution source capture (rulespec-gh SSNIT slice).
#
# National Pensions Act, 2008 (Act 766) section 3 (Contributions to the Scheme)
# sets the mandatory three-tier contribution rates that GHAMOD's tscee_gh
# (tscee_s) and tscer_gh (tscer_s) model: a worker's (employee) contribution of
# five and half per centum and an employer's contribution of thirteen per centum
# of the worker's salary (total eighteen and a half per centum), of which
# thirteen and half per centum is remitted to the first-tier basic national
# social security scheme (SSNIT) and five per centum to the second-tier
# mandatory occupational pension scheme; the minimum contribution is 18.5% of
# the approved monthly equivalent of the national daily minimum wage.
#
# Captured from the Assembly Press printed Act 766 on the Parliament of Ghana
# DSpace repository ORIGINAL bitstream. The print is text-embedded (no OCR).
