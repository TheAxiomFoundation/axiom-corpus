# Deferred base-act capture for Ghana Income Tax Act, 2015 (Act 896).
#
# Act 896 as hosted by GRA is a 182-page image-only PDF; a full OCR pass is
# slow and is not required for the first encoding batch (the individual
# rate schedule is fully sourced by the amending Act 1111 — see
# gh-income-tax-rate-schedule-official-documents.yaml). Capture this base
# act when encoding the reliefs framework (section 51 / Fifth Schedule) and
# other base provisions, so their enabling text is grounded in corpus.
documents:
