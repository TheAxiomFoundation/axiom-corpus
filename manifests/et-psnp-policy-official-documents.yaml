# Ethiopia social-protection capture - POLICY class (rulespec-et core
# instrument; ETMOD Productive Safety Net Programme parity; tracking
# rulespec-et#1).
#
# The Productive Safety Net Programme (PSNP) is the Government of Ethiopia's
# rural social-protection programme; its transfer values are set by the
# Ministry of Agriculture Programme Implementation Manual rather than by
# gazette. This scope captures the Phase IV Programme Implementation Manual:
#
# 1. PSNP IV Programme Implementation Manual (2014, final of 14 December
#    2014) - sets the transfer benchmark at the equivalent of 3kg of cereal
#    and 0.8 kg of pulses per person per day (15kg of cereal and 4kg of
#    pulses per person per month), the basis for both the cash wage rate and
#    the monthly food transfer.
#
# ETMOD comparison notes (targets, never sources): ETMOD applies the PSNP
# transfer benchmark above (3kg cereal + 0.8kg pulses per person per day /
# 15kg cereal + 4kg pulses per person per month) when valuing the safety-net
# transfer; this capture is the grounded programme document that target is
# checked against.
