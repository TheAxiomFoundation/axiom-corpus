      source_note: >-
        Productive Safety Net Programme Phase IV Programme Implementation
        Manual (PIM), the final version of 14 December 2014 issued by the
        Ministry of Agriculture. The programme's original USAID-hosted copy is
        dead; this capture is the Government-of-Ethiopia mirror served from
        srbofed.gov.et (the Southern Region Bureau of Finance and Economic
        Development), byte-verified against the SOUTHMOD/ETMOD harness copy. A
        344-page text-embedded PDF, extracted as a single block with no OCR.
        Grounds the transfer benchmark, verbatim: the daily cash wage rate is
        "calculated on the basis of the cost of buying 3kg of cereal and 0.8 kg
        of pulses per day (15kg of cereal and 4kg of pulses per person per
        month)", and "The monthly food transfer is 15kg of cereal and 4kg of
        pulses." Flag: captured from the GoE srbofed.gov.et mirror because the
        original USAID-hosted copy is no longer available.
