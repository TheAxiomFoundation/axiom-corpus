      source_note: >-
        Ministerial Statement on the Social Cash Transfer (SCT) delivered to
        the National Assembly by the Minister of Community Development and
        Social Services (Hon. Mwamba), hosted in the Assembly publication
        repository (text-embedded). Internal dating places it in the 2021
        sitting: it reports the 2021 caseload of 973,323 beneficiary
        households as current, targets 1.1 million "by the end of 2022", and
        describes the ZISPIS pilot as "earmarked for January/February, 2022";
        the expression_date reflects that CY2021 program year. On transfer
        values it states verbatim: "households without members with
        disabilities receive K200 per month per household paid every two
        months at K400 while households with a member with severe disability
        receive k400 per month per household paid every two months a t K800."
        These are the standing SCT transfer values used as the MicroZAMOD SCT
        target.
