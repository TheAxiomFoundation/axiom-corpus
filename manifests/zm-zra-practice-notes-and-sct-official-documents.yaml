# Zambia consumption-tax and social-protection capture - POLICY class
# (rulespec-zm instruments 7-8 and the Social Cash Transfer values;
# tracking rulespec-zm#1).
#
# Three agency/administrative documents that ground values whose primary
# Government Printer prints are not publicly digitized, captured here as
# verified reproductions:
#
# 1. ZRA Practice Note No. 1/2008 - reproduces the operative effect of
#    the Value Added Tax (Rate of Tax) Order, S.I. No. 14 of 2008: the
#    standard VAT rate drops from seventeen and a half per centum to
#    sixteen per centum, with the Order commencing 1 April 2008. This is
#    the enabling "lower rate" set under VAT Act s.9(3) (captured as a
#    statute in the companion manifest). The 16% standard rate is the
#    value MicroZAMOD applies for VAT.
# 2. ZRA Practice Note No. 1/2024 - reproduces the Customs and Excise
#    (Suspension) (Clear Beer) Regulations, S.I. No. 66 of 2023 and S.I.
#    No. 71 of 2023: excise duty on clear beer made from malt falls to
#    20% from 40% and clear beer made from cassava to 5% from 10%, in
#    force 1 January 2024 and self-revoking 31 December 2026, excluding
#    clear beer made from sorghum by a small and medium enterprise or
#    brewed in excess quantities.
# 3. MCDSS Ministerial Statement (Hon. Mwamba) - states the standing
#    Social Cash Transfer transfer values: K200 per month per household
#    (paid two-monthly at K400) for households without a member with a
#    disability, and K400 per month per household (paid two-monthly at
#    K800) where a member has a severe disability. These are the SCT
#    values MicroZAMOD reproduces.
#
# MicroZAMOD comparison notes (targets, never sources): the 16% VAT rate,
# the reduced clear-beer excise, and the SCT transfer amounts above are
# read into the indirect-tax and benefit modules; these captures are the
# grounded reproductions those targets are checked against.
