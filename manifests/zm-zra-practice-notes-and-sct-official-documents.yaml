      source_family: consumption-tax/vat
      source_note: >-
        Verified agency reproduction, not a primary print. The Value Added
        Tax (Rate of Tax) Order, S.I. No. 14 of 2008, is the instrument that
        sets the operative VAT standard rate under VAT Act s.9(3), but its
        primary Government Printer print is not publicly digitized; this ZRA
        Practice Note is the verified reproduction. Page 40, paragraph 5.6,
        under the heading "STATUTORY INSTRUMENT NUMBER 14 OF 2008", states:
        "This amendment reduces the tax rate from seventeen and half per
        centum to sixteen per centum." Page 38, paragraph 5.1 (Title and
        commencement), states that the VAT amendments come into effect on
        26 January 2008 "with the exception of Statutory Instrument Number
        14 of 2008, which comes into effect on 1st April 2008." Flag: this
        record grounds the 16% rate by reproduction; cite S.I. No. 14 of
        2008 as the primary instrument.
