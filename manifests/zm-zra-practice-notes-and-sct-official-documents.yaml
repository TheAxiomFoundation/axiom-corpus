      source_note: >-
        Verified agency reproduction, not a primary print. The Customs and
        Excise (Suspension) (Clear Beer) Regulations, S.I. No. 66 of 2023
        and S.I. No. 71 of 2023, are the instruments suspending clear-beer
        excise; their primary Government Printer prints are not publicly
        digitized, so this ZRA Practice Note is the verified reproduction.
        It states the Regulations "reduce the excise duty on clear beer made
        from malt to 20% from 40% and clear beer made from cassava to 5%
        from 10%", that they "come into operation on 1st January 2024 and
        shall stand revoked on 31st December 2026", and that they exclude
        clear beer made from sorghum manufactured by a small and medium
        enterprise or brewed in excess quantities. Flag: this record grounds
        the suspended clear-beer excise rates by reproduction; cite S.I.
        No. 66 and No. 71 of 2023 as the primary instruments.
