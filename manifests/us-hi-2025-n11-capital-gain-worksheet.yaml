      source_note: >-
        Official Hawaii resident individual income tax instructions. Printed
        page 33 (PDF page 35) states the complete Tax on Capital Gains Worksheet
        algorithm, including Hawaii long-term and short-term adjustments and the
        required smaller-of comparisons. This 2025 worksheet is retained for
        structural use only: its printed line-12 amounts of $24,000, $36,000,
        and $48,000 are incorrect for tax year 2026. Hawaii DOTAX's official
        April 22, 2026 correction notice replaces them with $48,000 for single
        or married filing separately, $72,000 for head of household, and
        $96,000 for joint or qualifying surviving spouse. Those corrected
        amounts are also the taxable-income ceilings below 7.25 percent in the
        HRS 235-51(a)-(c) schedules applicable to taxable years beginning after
        December 31, 2024; HRS 235-51(f) supplies the 7.25 percent alternative
        rate. Use corpus citation us-hi/statute/235-51 for 2026 amounts.
