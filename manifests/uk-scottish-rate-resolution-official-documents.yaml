      source_status: draft_scottish_rate_resolution_motion_agreed_by_parliament_2026-02-19
      source_note: >-
        Official Scottish Government publication of the draft Scottish Rate Resolution
        motion under section 80C of the Scotland Act 1998, setting the non-savings
        non-dividend income tax rates and band limits for Scottish taxpayers for tax
        year 2026-27. Published 13 January 2026; the motion in these terms was debated
        and agreed by the Scottish Parliament on 19 February 2026. This page carries the
        verbatim rate/band table (starter, basic, intermediate, higher, advanced, top).
