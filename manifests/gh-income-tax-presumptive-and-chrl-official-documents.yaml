# Ghana presumptive/turnover tax + COVID-19 Health Recovery Levy capture
# (rulespec-gh step 5, GHAMOD ttn_gh parity: ttn01_s presumptive 3%,
# ttn02_s CHRL 1%, summed into ttn_s).
#
# The presumptive turnover tax is Act 896 Second Schedule paragraph 5. Its
# band moved twice; the RATE stayed three per cent throughout:
#   base (2015): more than 20,000 - not exceeding 120,000 cedis
#   Act 902 s.2(a) (assent + gazette 30 Dec 2015): 20,000 - 200,000
#   Act 1071 s.2(b) (assent 30 Dec 2021) - IN FORCE for 2026: 20,000 -
#   500,000 Ghana Cedis (paragraph 6(1)(b) modified-cash-basis cap moved
#   120,000 -> 200,000 -> 500,000 in step; paragraph 2(1)(c)(i) 20,000
#   qualifying limb re-set as an average of three consecutive years).
# Supersession diligence: of the eleven Income Tax (Amendment) Acts
# 2015-2025 (all read in full for the step-4 capture), only Acts 902 and
# 1071 amend the Second Schedule; the Act 1071 text is the 2026 text.
#
# The 1% component GHAMOD adds for these payers is the COVID-19 Health
# Recovery Levy (Act 1068, 2021): section 1(4) sets the rate at one per
# cent on the value of the taxable supply; captured from the GRA-hosted
# print as its own document (own Act, own citation family).
#
# GHAMOD comparison note (parity targets, never sources): GH_2025 applies
# 3% + 1% on turnover with eligibility 10,000 <= ytn <= 120,000. The rates
# match; the band matches no in-force text (ceiling = the original 2015
# ceiling superseded within the same month by Act 902; floor 10,000 appears
# in no print). Recorded as a WIDER finding candidate in rulespec-gh#10.
