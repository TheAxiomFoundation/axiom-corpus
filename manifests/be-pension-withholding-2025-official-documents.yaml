      source_note: >-
        Official SFP pension-withholding tables effective 1 February 2025 (isolated
        and family-charge scales). Sets the indexed 2025 monthly thresholds for the
        3.55% INAMI (AMI) health withholding of article 191, 7 of the coordinated Law
        of 14 July 1994 (isolated exemption below 2037.72 EUR, phase-cap 2037.73-2112.71,
        full 3.55% from 2112.72; family-charge 2414.97/2414.98-2503.85/2503.86) and the
        article 68 section 2 solidarity contribution of the Law of 30 March 1994 (isolated
        0.01-3225.74 exempt, then 3225.75-3325.48 at (P-3225.74)/2, 3325.49-3572.77 at 1.50%,
        3572.78-3609.99 at (P-3465.59)/2, and 2% from 3610.00), executed by the Royal Decree
        of 8 December 2013. Archived Wayback capture (2025-06-22) of the securitesocialedoutremer.be
        page while it still showed the 2025 tables; the live page now shows the post-01.03.2026
        indexation. The amounts match EUROMOD BE_2025 tscpe_be exactly.
