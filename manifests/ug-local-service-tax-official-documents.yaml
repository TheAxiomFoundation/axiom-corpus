# Uganda Local Service Tax capture (rulespec-ug instrument 7, UGAMOD
# tgv_ug parity; tracking rulespec-ug#1).
#
# The Local Governments (Amendment) (No. 2) Act, 2008 (Act 8 of 2008 on
# the print's running heads) inserts the local service tax and local
# government hotel tax into the Local Governments Act: section 2 amends
# the Fifth Schedule, inserting the LST regulations with the graduated
# rate tables — salaried employees by monthly take-home income
# (>100,000-200,000: 5,000/yr through >1,000,000: 100,000/yr), and the
# self-employed classes (professionals, businessmen, artisans, commercial
# farmers) with their own banded amounts. UGAMOD's tgv_ug implements
# the employee table (loc01=1) and two self-employed classes exactly.
#
# Captured single-block from the parliament CMIS print (scan, fresh OCR
# at 300 dpi; the rate tables render row-contiguous at psm 3).
