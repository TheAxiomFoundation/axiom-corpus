# Ghana SSNIT contribution tax relief (rulespec-gh composed-pipeline
# capstone): National Pensions Act, 2008 (Act 766) section 112 — pension
# contributions not exceeding sixteen and one half per centum of monthly
# income are deductible income for the contributor's (and employer's)
# income tax. Grounds the composed worker pipeline's chargeable-income
# step (gross less the deductible employee SSNIT contribution). GHAMOD
# GH_2025 taxes gross employment income (il_tintb3 = yem, probed) —
# finding #13 in rulespec-gh#10.
