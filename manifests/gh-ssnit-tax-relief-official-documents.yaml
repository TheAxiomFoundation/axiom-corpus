      repository_item_url: https://repository.parliament.gh/items/f1b4dd99-6b7e-484c-b950-82a60129080c
      source_note: >-
        Section 112 (tax reliefs) of the same Assembly Press Act 766 print
        already captured for section 3 (axiom-corpus#256): subsection (2)
        treats contributions not exceeding sixteen and one half per centum
        of a contributor's monthly income as deductible income for the
        contributor's and the employer's income tax, to the extent of
        their respective contributions. Amendment diligence as for the
        section 3 slice: Act 883 (2014) does not alter section 112.
