      source_note: >-
        Official chaptered law corresponding to enrolled SB 1510-A. Sections 9
        through 12 extend the elective pass-through business alternative
        income tax and member credit through tax years beginning before January
        1, 2028, and allow a pass-through entity to apply an overpayment to the
        subsequent tax year's estimated tax.
