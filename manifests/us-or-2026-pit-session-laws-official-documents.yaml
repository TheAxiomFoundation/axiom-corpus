      approval_date: "2026-04-09"
      effective_date: "2026-06-05"
      source_status: chaptered_law
      source_family: personal-income-tax
      relevant_sections: "2,3,5,7,10,12,13,14"
      source_note: >-
        Official chaptered law. Sections 2, 5, and 7 establish tax-year-2026
        personal-income-tax modifications for qualified passenger vehicle loan
        interest, qualified small business stock gain, and federal bonus
        depreciation; section 3 raises the refundable Oregon earned income
        credit percentages to 14 and 17 percent; and sections 12 through 14
        create and limit a nonrefundable new-jobs credit. The official
        publication notes that sections 2 and 7 were identified as subjects of
        an April 2026 referendum petition and preserves the petition-status
        endnote as part of the authoritative source.

