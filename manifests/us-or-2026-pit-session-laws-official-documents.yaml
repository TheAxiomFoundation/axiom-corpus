      source_status: chaptered_law
      source_family: personal-income-tax/new-jobs-credit
      relevant_sections: "16,17"
      source_note: >-
        Official chaptered law corresponding to enrolled HB 4084-A. Section 16
        amends section 12, chapter 142, Oregon Laws 2026 (SB 1507), to restrict
        the new-jobs credit to taxpayers engaged primarily in a qualified
        industry and to jobs created in a qualified industry, defines the
        qualifying industry categories, and adds certification and rulemaking
        requirements. Section 17 gives the Act a June 5, 2026 effective date.

