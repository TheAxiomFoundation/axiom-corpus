    metadata:
      primary_source: true
      source_authority: Ministry of Legal Affairs, Government of the Republic of Zambia
      publisher: Government Printer, Lusaka
      source_family: consumption-tax/vat
      source_note: >-
        Laws of Zambia revised chapter edition of the Value Added Tax Act
        (Cap. 331; principal Act No. 4 of 1995) from the National Assembly
        repository (text-embedded; "Copyright Ministry of Legal Affairs,
        Government of the Republic of Zambia"). Edition vintage: the
        amendment history at the front runs from Act No. 4 of 1995 through
        statutory instruments ending at S.I. No. 16 of 1997, so the chapter
        text is consolidated as at 1997; the Act came into operation on
        1 May 1995 with 1 July 1995 appointed as the tax commencement day
        (S.I. No. 58 of 1995), which is the expression_date used here.
        Section 9(1): "Tax on a taxable supply of goods or services shall be
        charged on their taxable value, at the prescribed rate of tax."
        Section 9(3): "The prescribed rate of tax shall be seventeen and a
        half per centum, unless the Minister, by statutory order, determines
        a lower rate." Section 9 is unchanged through CY2025; the operative
        16% standard rate is set by S.I. No. 14 of 2008, captured separately
        as a ZRA agency reproduction (the SI's primary print is not publicly
        digitized) in the policy manifest.
