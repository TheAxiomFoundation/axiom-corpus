# Zambia consumption-tax capture - CUSTOMS & EXCISE chain and the VAT
# Act charging provision (rulespec-zm instruments 7-8; MicroZAMOD
# indirect-tax parity for excise duties and VAT; tracking rulespec-zm#1).
#
# The Customs and Excise Act (Cap. 322) Second Schedule sets the specific
# and ad valorem excise duties. This scope captures the Government Printer
# assented prints of the five amendment Acts that move the excise rows the
# encoding depends on - each read as one with the principal Act and each
# commencing on 1 January of the following year (section 1(2) of each Act) -
# plus the Value Added Tax Act charging section:
#
# 1. Act No. 19 of 2018 (comm. 1 Jan 2019) - Second Schedule heading 4
#    "Beer made from malt": (1) Opaque beer 2203.00.10 at K0.15/ltr; (2)
#    Other, including ale, lager and stout 2203.00.90 at 60%; heading 5
#    wine of fresh grapes rows at 60%. The baseline opaque-beer rate.
# 2. Act No. 45 of 2021 (comm. 1 Jan 2022) - raises opaque beer from
#    K0.15 to K0.25/ltr; substitutes heading 9 fuel rows, petrol
#    2710.12.10 at K2.07/ltr (the combined excise-plus-fuel-levy motor-
#    spirit row) and gas-oils/diesel 2710.19.10 at K0.66/ltr; cuts spirits
#    2207.10.00 from 125% to 60%.
# 3. Act No. 25 of 2022 (comm. 1 Jan 2023) - spirits 2207.20.10 from 125%
#    to 60%; cigarettes (heading 24.01) from K355 to K361 per mille.
# 4. Act No. 25 of 2023 (comm. 1 Jan 2024) - spirits 2207.20.90 from 125%
#    to 60%; cigarettes from K361 to K400.
# 5. Act No. 24 of 2024 (comm. 1 Jan 2025) - cigarettes from K400 to K452
#    across headings 24.01/24.02 and subheadings 2403.x; substitutes
#    heading 9(3): petrol 2710.12.10 K2.34/ltr, gas-oils/diesel 2710.19.10
#    K0.75, kerosene-type 2710.12.51 K0.54, other fuel oils 2710.19.20
#    K1.05.
# 6. Value Added Tax Act (Cap. 331, Act No. 4 of 1995) - the Laws of
#    Zambia revised chapter edition (Copyright Ministry of Legal Affairs),
#    whose amendment history lists statutory instruments through S.I.
#    No. 16 of 1997. Section 9(1) charges tax on a taxable supply "at the
#    prescribed rate of tax"; section 9(3): "The prescribed rate of tax
#    shall be seventeen and a half per centum, unless the Minister, by
#    statutory order, determines a lower rate" - the enabling provision
#    under which the operative 16% rate is set by S.I. No. 14 of 2008.
#    Section 9 is unchanged through CY2025; the 16% order is captured
#    separately as a ZRA agency reproduction in the policy manifest.
#
# MicroZAMOD comparison notes (targets, never sources): the indirect-tax
# module applies these excise rows and the 16% VAT standard rate; the
# fuel-levy component rides in the same heading-9 excise row captured here.
