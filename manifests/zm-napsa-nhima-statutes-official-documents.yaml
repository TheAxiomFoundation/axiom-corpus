      source_family: social-security/napsa
      source_note: >-
        Laws of Zambia chapter edition of the National Pension Scheme
        Act, 1996 (Act No. 40 of 1996, Cap. 256) from the National
        Assembly repository (text-embedded). Section 14: contributions
        at the prescribed percentage (employer + employee shares;
        s.14(4) actuarial determination). Section 19: annual adjustment
        of pensionable earnings by an index based on national average
        earnings, by statutory instrument. The prescribed 5%/5% shares
        live in the Pensionable Earnings Regulations chain (S.I. 22 of
        2000 as amended; the amendment SIs are captured alongside).
