# Zambia social-insurance contribution captures - STATUTES (rulespec-zm
# instruments 3-6, MicroZAMOD tsceepi/tscerpi/tsceehl/tscerhl parity;
# tracking rulespec-zm#1).
#
# NAPSA: the National Pension Scheme Act, 1996 (Cap. 256) s.14 requires
# the employer to pay "the employer's contribution and the employee's
# contribution at the prescribed percentage" (delegated; s.14(4)
# actuarial determination), and s.19(3) provides that pensionable
# earnings "shall be adjusted annually by an index based on the
# national average earnings" by statutory instrument. The prescribed
# 5% employee + 5% employer shares are stated in the Fifth Schedule
# note of the National Pension Scheme (Pensionable Earnings)
# (Amendment) Regulations (base regs S.I. No. 22 of 2000, not publicly
# digitized): "The amounts of the employee's and employee's share
# shall be calculated respectively as five percent of the employee's
# total pensionable earnings." S.I. No. 9 of 2024 sets the CY2024
# schedules (NAE 7,454; social security ceiling 29,816 = 4x NAE);
# S.I. No. 103 of 2025 sets CY2026 (NAE 9,309; ceiling 37,236 = 4x).
# Every published year satisfies ceiling = 4 x NAE exactly; the CY2025
# ceiling (34,164 = 4 x 8,541) has no dedicated SI - it operates
# through the formula applied to the Zambia Statistics Agency NAE
# determination, announced administratively by NAPSA (policy-class
# capture to follow with the NAPSA slice). Act No. 1 of 2023 amends
# s.19(5) so the Authority determines NAE annually "by applying
# statistics and data compiled by the Zambia Statistics Agency".
#
# NHIMA: the National Health Insurance Act, 2018 (Act No. 2 of 2018)
# s.15 requires contributions "at a prescribed percentage" (s.15(5)
# ministerial prescription); the National Health Insurance (General)
# Regulations, 2019 (S.I. No. 63 of 2019) reg 9 + Third Schedule
# prescribe: employee 1% of basic salary, employer 1% of basic salary,
# self-employed 1% of declared income, monthly. Neither NHI instrument
# contains an income-tax-deductibility provision.
#
# MicroZAMOD comparison notes (targets, never sources): tsceepi/tscerpi
# = 5% of yem each with contribution cap 1,708.20/month (2025);
# tsceehl/tscerhl = 1% of yem uncapped - and ZM_2025 deducts both
# employee shares from the PAYE base (candidate finding 1; no
# statutory deduction found).
