      date_of_assent: '2023-04-18'
      source_family: social-security/napsa
      source_note: >-
        Assented print (text-embedded; ZambiaLII-hosted copy of the
        Government Printer print). Amends s.19(5) so the Authority
        determines national average earnings annually by applying
        Zambia Statistics Agency data; inserts s.19A (80% minimum
        pension floor) and s.21A (pre-retirement lump sum of 20% of
        indexed contributions). Does not touch the s.14 contribution
        provisions.
