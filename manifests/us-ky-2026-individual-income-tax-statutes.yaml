      source_note: >-
        Official current codified section. KRS 141.020(2)(f) states that for
        taxable years beginning on or after January 1, 2026, the individual
        income tax is 3.5 percent of net income. This intake preserves the
        complete section and certifies only that statutory rate and effective
        period; it does not certify a complete final-return calculation.

