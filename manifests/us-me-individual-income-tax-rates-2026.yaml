      source_note: >-
        Official Maine Revenue Services tax-year-2026 rate schedule, revised
        May 20, 2026. It publishes the three graduated rates, filing-status
        thresholds, bracket base amounts, and a 2% surcharge on Maine taxable
        income above the filing-status threshold. This scope supports a
        schedule calculation only after Maine taxable income and filing status
        have already been determined. It does not establish Maine taxable
        income, deductions, exemptions, credits, withholding, residency,
        nonresident allocation, tax-table substitution, RuleSpec semantics,
        PolicyEngine parity, or final-return liability.
