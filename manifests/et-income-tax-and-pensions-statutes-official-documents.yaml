# Ethiopia direct-tax, social-insurance and VAT capture - STATUTE class
# (rulespec-et core instruments; ETMOD income-tax, pension-contribution and
# VAT parity; tracking rulespec-et#1).
#
# Five federal primary instruments that ground the operative rate schedules
# and charging provisions the Ethiopia encoding depends on:
#
# 1. Income Tax (Amendment) Proclamation No. 1395/2025 - restructures the
#    Schedule B/C rate tables and taxpayer categories effective 8 July 2025.
#    Employment (Schedule A) monthly bands 2,000 / 4,000 / 7,000 / 10,000 /
#    14,000 Birr at 15/20/25/30/35 percent (0-2,000 exempt); business
#    (Schedule C) annual bands 24,000 / 48,000 / 84,000 / 120,000 / 168,000;
#    the presumptive/turnover schedule 100,000 / 500,000 / 1,000,000 /
#    1,500,000 / 2,000,000 at 2/3/5/7/9 percent; Article 23 Minimum
#    Alternative Tax; and the Category A/B split at Birr 2,000,000 turnover.
# 2. Federal Income Tax Proclamation No. 979/2016 - the base Schedule A/B/C
#    proclamation the 2025 amendment operates on; grounds the employment
#    deduction bar (Art 10(3)) and the two 15%-of-monthly-employment-income
#    limits (Arts 27(1)(c) and 65(1)(c)).
# 3. Private Organization Employees' Pension Proclamation No. 715/2011 -
#    Article 10 contribution split: employer 11%, employee 7%.
# 4. Public Servants' Pension Proclamation No. 714/2011 - Article 10 split
#    (public office 11%, public servant 7%) and Article 11 military & police
#    split (public office 25%, public servant 7%).
# 5. Value Added Tax Proclamation No. 1341/2024 - Article 8 imposition, the
#    standard rate "in any other case 15 percent"; repeals VAT Proc 285/2002.
#
# ETMOD comparison notes (targets, never sources): ETMOD applies the
# Schedule A employment PIT bands and rates above, the 7%/11% employee and
# employer pension contribution split (25% employer share for military and
# police), and the 15% standard VAT rate; these captures are the grounded
# primary instruments those targets are checked against.
