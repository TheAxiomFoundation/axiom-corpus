      source_family: income-tax/schedules-and-rates
      source_note: >-
        Ministry of Finance archive signed copy of the Income Tax (Amendment)
        Proclamation No. 1395/2025 - an advance print carrying the signature
        block but a blank gazette number on the title (the gazette-numbered
        Federal Negarit Gazette print is not publicly digitized), obtained via
        the metaappz Ethiopian-laws reference collection and byte-verified
        against the SOUTHMOD/ETMOD harness copy. The document is a 51-page
        bilingual (Amharic/English) scan whose embedded text layer is garbled,
        so extraction runs a fresh OCR at 350 dpi (eng, psm 3, force_ocr) over
        the whole file as a single block; the Amharic pages OCR to noise
        (harmless) while the English pages carry the operative text. Grounds:
        the Schedule A employment monthly bands 2,000 / 4,000 / 7,000 /
        10,000 / 14,000 Birr at 15/20/25/30/35 percent (first 2,000 exempt);
        the Schedule C business annual bands 24,000 / 48,000 / 84,000 /
        120,000 / 168,000; the presumptive/turnover schedule 100,000 /
        500,000 / 1,000,000 / 1,500,000 / 2,000,000 at 2/3/5/7/9 percent;
        Article 23 Minimum Alternative Tax (tax below 2.5% of turnover, reduced
        by business income tax, not applying to a taxpayer under the total
        gross revenue tax regime in Article 49); the Category A / Category B
        split at Birr 2,000,000 gross revenue; and the effective date of
        8 July 2025. Flag: MoF-archive signed advance copy, gazette-numbered
        print not publicly digitized, fresh 350 dpi OCR over a bilingual scan.
