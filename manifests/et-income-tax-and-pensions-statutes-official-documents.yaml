    metadata:
      primary_source: true
      source_authority: Federal Democratic Republic of Ethiopia (House of Peoples' Representatives)
      publisher: Federal Negarit Gazette (Berhanena Selam Printing Enterprise)
      source_family: income-tax/base-proclamation
      source_note: >-
        Genuine Federal Negarit Gazette Extraordinary Issue, 22nd Year No. 104,
        Addis Ababa 18 August 2016 (title-page issue line and date verified on
        the face), a faithful reproduction hosted in the metaappz Ethiopian-
        laws reference collection and byte-verified against the SOUTHMOD/ETMOD
        harness copy. Text-embedded and clean, extracted as a single block with
        no OCR. This is the base Schedule A/B/C proclamation the 2025 amendment
        operates on. Grounds: Article 10(3) "An employee shall not be allowed a
        deduction"; Article 27(1)(c) employer pension/provident contribution
        deductible only up to the part not "in excess of 15%" of monthly
        employment income; Article 65(1)(c) the same 15%-of-monthly-employment-
        income ceiling ("does not exceed 15% of the monthly employment
        income").
