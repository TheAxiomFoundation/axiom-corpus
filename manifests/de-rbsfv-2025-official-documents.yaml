      title_alternative: >-
        Verordnung zur Bestimmung der für die Fortschreibung der
        Regelbedarfsstufen nach § 28a und für die Fortschreibung des
        Teilbetrags nach § 34 Absatz 3a Satz 1 des Zwölften Buches
        Sozialgesetzbuch maßgeblichen Prozentsätze sowie zur Ergänzung der
        Anlage zu §§ 28 und 34 des Zwölften Buches Sozialgesetzbuch für das
        Jahr 2025
