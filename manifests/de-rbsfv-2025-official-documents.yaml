      date_document: '2024-10-18'
      date_publication: '2024-10-23'
      in_force: true
      amends: >-
        Anlage zu § 28 and Anlage zu § 34 of the Zwölftes Buch
        Sozialgesetzbuch (SGB 12): §§ 2–3 append the "1. Januar 2025" rows
        (Regelbedarfsstufen and Schulbedarf-Teilbeträge) under the § 40
        SGB XII authority. It does not change any other SGB XII provision
        text.
      amendment_targets:
        - de/statute/sgb-12
        - de/statute/sgb-12/anlage-bjne014918130
        - de/statute/sgb-12/anlage-bjne020206130
      source_family: citizens-benefit/regelbedarf
      source_note: >-
        Official electronic Bundesgesetzblatt PDF (BGBl. 2024 I Nr. 312,
        ausgegeben zu Bonn am 23. Oktober 2024), downloaded 2026-07-21 from
        the stable recht.bund.de publicationFile URL. Text-embedded PDF, no
        OCR needed. Key contents, verbatim-verified against the PDF text:
        § 1 Abs. 1 sets the 2025 Fortschreibung percentages (Basisfort-
        schreibung "4,60 Prozent", ergänzende Fortschreibung "0,7 Prozent");
        § 1 Abs. 2 records that the resulting amounts are LOWER than the 2024
        amounts, so under the § 28a Abs. 5 SGB XII Besitzschutz the 2024
        Eurobeträge continue to apply from 1. Januar 2025 (the "Nullrunde");
        § 2 appends the Anlage zu § 28 row "1. Januar 2025 | 563 | 506 | 451
        | 471 | 390 | 357" (Regelbedarfsstufen 1–6, the amounts SGB II § 20
        Bürgergeld encoding needs for the 2025 validation year); § 3 appends
        the Anlage zu § 34 row for 2025 (Schulbedarf 130 / 65 Euro); § 4: in
        force 1. Januar 2025, simultaneously repealing the RBSFV 2024 (BGBl.
        2023 I Nr. 287).
