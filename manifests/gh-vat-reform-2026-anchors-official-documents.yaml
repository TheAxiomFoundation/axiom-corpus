# Ghana December 2025 VAT-reform anchors (rulespec-gh consumption tranche +
# the CHRL correction).
#
# The 2026 consumption-tax law was restructured by four Acts assented
# 9-24 December 2025 (all captured from Parliament of Ghana DSpace ORIGINAL
# bitstreams):
# 1. Value Added Tax Act, 2025 (Act 1151) — a full consolidated VAT Act
#    replacing the Act 870 chain; s.3 keeps the rate at fifteen per cent;
#    s.75 commences the Act on 1 January 2026. Assent 9 Dec 2025.
# 2. COVID-19 Health Recovery Levy (Repeal) Act, 2025 (Act 1150) — repeals
#    Act 1068 (the 1% CHRL) with savings for pre-repeal liabilities.
#    Assent + gazette 10 Dec 2025. This DATES the rulespec-gh CHRL module:
#    the levy's live window is 2021-03-31 .. 2025-12-09.
# 3. Ghana Education Trust Fund (Amendment) Act, 2025 (Act 1152) —
#    substitutes section 3A of Act 581: GETFund Levy at two and a half per
#    cent. Assent + gazette 24 Dec 2025.
# 4. National Health Insurance (Amendment) Act, 2025 (Act 1156) —
#    substitutes section 47 of Act 852: NHIL at two and a half per cent
#    (20% of NHIL revenue allocated to the Ghana Medical Trust Fund;
#    deductibility provisions in ss.48-51). Assent + gazette 24 Dec 2025.
#
# Net 2026 standard consumption wedge: 15% VAT + 2.5% NHIL + 2.5% GETFund
# = 20% (the CHRL's 1% removed). GHAMOD GH_2025 models 21% including the
# CHRL — correct for its 2025 policy year (the repeal fell 10 Dec 2025);
# the 2026 validation year is the first where the lane's year and the
# oracle's policy year genuinely diverge (rulespec-gh#10).
