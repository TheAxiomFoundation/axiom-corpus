# Germany operative instruments behind 2025 validation-year values that the
# statute text delegates: the PV Beitragssatz (3,6 % from 2025-01-01, set by
# PBAV 2025 under § 55 Abs. 1a SGB XI), the gesetzlicher Mindestlohn (12,82 €
# from 2025-01-01, set by MiLoV4, feeding the § 8 Abs. 1a SGB IV
# Geringfügigkeitsgrenze formula), and the Rentenversicherung Beitragssatz
# chain: BSV 2018 (under the § 160 SGB VI authority) SET the 18,6 % rate for
# 2018, and because § 158 Abs. 4 SGB VI requires the Bundesregierung to
# announce the continuation of unchanged rates in the Bundesgesetzblatt each
# year, the operative 2025 instrument is the RVBeitrSBek 2025 continuation
# notice ("beträgt weiterhin ... 18,6 Prozent"; the SGB VI body itself only
# states the § 287 floor).
#
# Same source class and converter as the main DE manifest
# (de-federal-tax-benefit-statutes-official-documents.yaml, which also lists
# these three slugs for future full re-ingest waves): official consolidated
# juris XML from gesetze-im-internet.de, live-fetched, self-stamped
# source_as_of. This wave runs only the three additions so the existing
# 2026-07-16 consolidation artifacts stay byte-identical; the composed scope
# version joins both (see scripts/compose_scope_versions.py).
#
# All three slugs verified HTTP 200 on 2026-07-21.
#
# Run:
#   uv run axiom-corpus-ingest extract-de-gii \
#     --base data/corpus \
#     --version <version> \
#     --manifest manifests/de-2025-operative-verordnungen-gii.yaml
documents:
  - source_id: de-pbav-2025
    jurisdiction: de
    document_class: regulation
    slug: pbav_2025
    citation_path: de/regulation/pbav-2025
    title: Pflege-Beitragssatz-Anpassungsverordnung 2025 (PBAV 2025)
    source_url: 'https://www.gesetze-im-internet.de/pbav_2025/xml.zip'
    source_format: gesetze-im-internet.de-juris-xml
    request:
      browser_user_agent: true
    metadata:
      primary_source: true
      source_authority: Bundesministerium der Justiz (juris GmbH)
      jurabk: PBAV 2025
      ausfertigung_datum: '2024-12-20'
      source_family: social-insurance/long-term-care-contribution-rate
  - source_id: de-milov4
    jurisdiction: de
    document_class: regulation
    slug: milov4
    citation_path: de/regulation/milov4
    title: Vierte Verordnung zur Anpassung der Höhe des Mindestlohns (MiLoV4)
    source_url: 'https://www.gesetze-im-internet.de/milov4/xml.zip'
    source_format: gesetze-im-internet.de-juris-xml
    request:
      browser_user_agent: true
    metadata:
