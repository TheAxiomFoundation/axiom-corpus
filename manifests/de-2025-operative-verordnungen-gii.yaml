      source_authority: Bundesministerium der Justiz (juris GmbH)
      jurabk: MiLoV4
      ausfertigung_datum: '2023-11-24'
      source_family: labor/minimum-wage
  - source_id: de-bsv-2018
    jurisdiction: de
    document_class: regulation
    slug: bsv_2018
    citation_path: de/regulation/bsv-2018
    title: Verordnung zur Bestimmung der Beitragssätze in der gesetzlichen Rentenversicherung für das Jahr 2018 (Beitragssatzverordnung 2018 – BSV 2018)
    source_url: 'https://www.gesetze-im-internet.de/bsv_2018/xml.zip'
    source_format: gesetze-im-internet.de-juris-xml
    request:
      browser_user_agent: true
    metadata:
      primary_source: true
      source_authority: Bundesministerium der Justiz (juris GmbH)
      jurabk: BSV 2018
      ausfertigung_datum: '2017-12-18'
      source_family: social-insurance/pension-contribution-rate
      source_note: >-
        Sets the allgemeine Rentenversicherung Beitragssatz at 18,6 Prozent
        "für das Jahr 2018" under the § 160 SGB VI authority. By itself this
        does not establish the 2025 rate: § 158 Abs. 4 SGB VI requires the
        Bundesregierung to announce the continuation of unchanged rates in
        the Bundesgesetzblatt for each following year — the operative 2025
        instrument is the RVBeitrSBek 2025 continuation notice ingested
        alongside this document (source_id de-rvbeitrsbek-2025).
  - source_id: de-rvbeitrsbek-2025
    jurisdiction: de
    document_class: regulation
    slug: rvbeitrsbek_2025
    citation_path: de/regulation/rvbeitrsbek-2025
    title: Bekanntmachung der Beitragssätze in der allgemeinen Rentenversicherung und der knappschaftlichen Rentenversicherung für das Jahr 2025 (RVBeitrSBek 2025)
    source_url: 'https://www.gesetze-im-internet.de/rvbeitrsbek_2025/xml.zip'
    source_format: gesetze-im-internet.de-juris-xml
    request:
      browser_user_agent: true
    metadata:
      primary_source: true
      source_authority: Bundesministerium der Justiz (juris GmbH)
      jurabk: RVBeitrSBek 2025
      ausfertigung_datum: '2024-11-19'
      document_type: Bekanntmachung (contribution-rate continuation notice under § 158 Abs. 4 SGB VI)
      source_family: social-insurance/pension-contribution-rate
      source_note: >-
        The § 158 Abs. 4 SGB VI continuation notice for 2025 (BGBl. 2024 I
        Nr. 368, v. 19.11.2024): "Der Beitragssatz für das Jahr 2025 beträgt
        weiterhin in der allgemeinen Rentenversicherung 18,6 Prozent und in
        der knappschaftlichen Rentenversicherung 24,7 Prozent." This is the
        operative instrument that establishes the unchanged 18,6 % rate for
        the 2025 validation year; BSV 2018 (ingested alongside) is the
        instrument that originally set the rate.
