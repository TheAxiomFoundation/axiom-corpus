# Ethiopia direct-tax and VAT capture - REGULATION class (rulespec-et core
# instruments; ETMOD income-tax and VAT parity; tracking rulespec-et#1).
#
# Two subsidiary instruments made under the income-tax and VAT proclamations:
#
# 1. Council of Ministers Federal Income Tax Regulation No. 410/2017 - the
#    Schedule A/B/C implementing regulation issued under Article 99 of the
#    Federal Income Tax Proclamation No. 979/2016 (Federal Negarit Gazette
#    No. 82, 24 August 2017); provides the deduction, allowance and
#    presumptive-computation detail the ETMOD income-tax module reads.
# 2. Ministry of Finance Directive No. 1021/2024 - the VAT exemption
#    thresholds for domestic electricity and water consumption, made under
#    Article 1(m) of Annex 2 of the Value Added Tax Proclamation No.
#    1341/2024: monthly electricity consumption up to 200 kWh and monthly
#    water consumption up to 15 cubic meters are exempt.
#
# ETMOD comparison notes (targets, never sources): the regulation grounds the
# Schedule A/B/C computation detail behind the proclamation rate tables, and
# the directive grounds the 200 kWh / 15 m3 VAT-exemption thresholds; these
# captures are the grounded instruments those targets are checked against.
