# Zambia PAYE and turnover-tax capture (rulespec-zm instruments 1-2,
# MicroZAMOD tin_zm / ttn_zm parity; tracking rulespec-zm#1).
#
# 1. The Income Tax (Amendment) Act, 2023 (Act No. 22 of 2023; assent
#    22 December 2023, in force 1 January 2024) sets the CY2024-CY2025
#    individual rate structure: s.11(a) edits Charging Schedule
#    paragraph 2(1) item (c)'s upper bound to sixty-one thousand two
#    hundred Kwacha and substitutes items (d), (e) and (f) — 20% on the
#    balance exceeding 61,200 up to 85,200; 30% exceeding 85,200 up to
#    110,400; 37% above 110,400 (per annum). Unchanged by the December
#    2024 package (Act 22 of 2024 touches paragraphs 5-7 only) and by
#    the mid-2025 Act 10 of 2025 (Minimum Alternative Tax, assented
#    8 August 2025 — post the 30 June EUROMOD policy snapshot).
# 2. The Income Tax (Amendment) Act, 2024 (Act No. 22 of 2024; assent
#    20 December 2024, in force 1 January 2025): s.2 deletes the
#    approved annuity contract / approved pension fund definitions and
#    redefines "approved fund"; s.4 substitutes s.37(1) so the
#    approved-fund contribution deduction is allowed in ascertaining
#    the gains or profits of an EMPLOYER (no employee-side deduction);
#    s.8 raises the s.64A turnover-tax ceiling from eight hundred
#    thousand to five million kwacha (subsections (2) and (2A)(a));
#    s.14(b) substitutes Ninth Schedule Part II — TAX ON TURNOVER:
#    K12,000 or less at 0 percent, above K12,000 up to K5,000,000 at
#    5 percent.
#
# MicroZAMOD comparison notes (targets, never sources): ZM_2025 tin_s
# reproduces the 4-band schedule exactly but on a base NET of employee
# NAPSA and NHIMA contributions (ttb_s = yem - tsceepi_s - tsceehl_s),
# and ttn_s applies 5% from the first kwacha of turnover — both are
# candidate findings against these prints.
