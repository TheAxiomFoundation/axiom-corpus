      five_percent_income_rate: "0.05"
      five_percent_income_categories: >-
        Wages, salaries, tips, business income, partnership and S corporation
        income, trust income, rental income, unemployment compensation,
        taxable alimony, pensions and annuity income, IRA/Keogh distributions,
        winnings, fees, long-term capital gain income not taxed at 8.5% or
        12%, interest and dividend income, and other taxable income not taxed
        at 8.5% or 12%.
      surtax_threshold: "1107750"
      surtax_rate: "0.04"
      estimated_surtax_worksheet_formula: >-
        Add column A of worksheet lines 1 through 2c, subtract the $1,107,750
        surtax threshold, and multiply worksheet line 3 by 4%.
      statutory_rate_corpus_citation: us-ma/statute/62/4/block-2
      statutory_corpus_version: 2026-07-13-recovery
      source_note: >-
        Official tax-year-2026 Form 1-ES estimated-tax instructions and
        worksheet. Page 3 assigns a 5% rate to the listed ordinary-income
        categories and computes estimated 4% surtax by adding worksheet
        column A lines 1 through 2c, subtracting the $1,107,750 threshold, and
        multiplying line 3 by 4%. This form scope supports estimated-tax
        calculations only and does not certify final tax-year-2026 Form 1 or
        Form 1-NR/PY liability.
