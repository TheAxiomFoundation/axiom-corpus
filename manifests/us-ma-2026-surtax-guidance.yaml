      taxable_income_parts: Part A, Part B, and Part C
      negative_part_treatment: Each negative Part is treated as zero
      cross_part_loss_rule: >-
        Once taxable income in each Part is determined, a negative amount in
        one Part cannot reduce taxable income in another Part for the surtax.
      statutory_rate_corpus_citation: us-ma/statute/62/4/block-2
      statutory_corpus_version: 2026-07-13-recovery
      source_note: >-
        Current official DOR guidance, updated June 1, 2026. The retained
        calculation section publishes the tax-year-2026 $1,107,750 threshold,
        the 4% excess-income formula, and the rule that the surtax base sums
        only positive Part A, Part B, and Part C taxable-income amounts after
        any cross-Part deductions otherwise allowed by statute. This separate
        guidance scope clarifies the base boundary; it does not certify a
        complete final-return calculation.
