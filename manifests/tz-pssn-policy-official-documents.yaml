      source_note: >-
        World Bank Project Appraisal Document PAD3139 of 16 August 2019
        for the Second Productive Social Safety Net Project (P169165;
        99-page text-embedded print, Public Disclosure Authorized).
        Grounds the PSSN II benefit structure the TASAF-run programme
        applies from 2021 (Table 2, and identically Annex Table 2.2):
        fixed direct support/productive transfer TZS 12,000 per month;
        child grant TZS 5,000 (at least one child under 18); disability
        grant TZS 5,000; infant human-capital transfer TZS 5,000 (0-5
        years, health conditionality); variable conditional transfers
        of TZS 2,000 per lower-primary and TZS 4,000 per upper-primary
        child (combined primary cap TZS 12,000) and TZS 6,000 per
        lower-secondary and TZS 8,000 per upper-secondary child (cap
        TZS 16,000); household minimum TZS 12,000 and maximum TZS
        55,000 per month; public-works wage 3,000 per day. TASAF's own
        PSSN II operational manual is not publicly digitized (the
        TASAF document archive is retired and the current site carries
        only PSSN III handbooks with a different schedule), and the
        SOUTHMOD country report cites an internal TASAF (2021) mission
        paper for the same amounts - this PAD is the public official
        carrier. PSSN transfers are set administratively by TASAF
        under government expenditure authority; no Act fixes the
        amounts.
