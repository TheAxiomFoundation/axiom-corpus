# Tanzania social-protection programme rules - POLICY class (rulespec-tz
# PSSN transfer instruments; TAZMOD TZ_2023 parity; tracking
# rulespec-tz#1).
#
# One official programme document:
#
# 1. World Bank Project Appraisal Document PAD3139 (August 2019) for
#    the Second Productive Social Safety Net Project (P169165) - the
#    publicly disclosed appraisal of the Government of Tanzania /
#    TASAF PSSN II program, carrying the approved Phase-2 benefit
#    structure verbatim (Table 2 and Annex Table 2.2): fixed direct
#    support/productive transfer TZS 12,000 per month; child grant
#    5,000 (household with a child under 18); disability grant 5,000;
#    infant human-capital transfer 5,000 (0-5 years health); variable
#    conditional transfers lower primary 2,000 and upper primary 4,000
#    (combined cap 12,000), lower secondary 6,000 and upper secondary
#    8,000 (cap 16,000); household minimum 12,000 and maximum 55,000
#    per month. TASAF's own PSSN II operational manual is not publicly
#    digitized (the retired document archive 404s and the current
#    TASAF site carries only the PSSN III handbooks with a different
#    schedule); the SOUTHMOD country report sources the same schedule
#    to an internal TASAF (2021) mission paper. The PAD is the public
#    official carrier of the amounts.
#
# TAZMOD comparison notes (targets, never sources): TZ_2023 pays the
# fixed 12,000 adult + 5,000 child amounts (bsa) and the conditional
# infant/primary/secondary/disability amounts with the 12,000/16,000
# caps (bsa01), gated on the programme-registration flag; probed
# 17,000 + 17,000 on an adult-plus-three-children household.
