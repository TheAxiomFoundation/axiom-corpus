# Ghana capital/investment-income withholding source capture (rulespec-gh
# step 4, GHAMOD tinkt_gh parity: tiniy_s investment income, tinrt_s rent).
#
# The withholding surface for the 2026 year of assessment is set by:
# 1. Income Tax Act, 2015 (Act 896) section 115 as SUBSTITUTED by the Income
#    Tax (Amendment) Act, 2025 (Act 1134) section 3 — already in corpus at
#    gh/statute/act-1134/income-tax-amendment-2025/
#    withholding-and-first-schedule-paragraph-8. The base section 115 is
#    captured here for the substitution chain record.
# 2. Act 896 section 119 (final withholding payments): base text captured
#    here; paragraph (f) was substituted by Act 1094 s.10 and DELETED by Act
#    1134 s.4; paragraphs (a) (dividends) and (b) (rent paid to a resident
#    individual) are unamended base text and make the dividend and
#    resident-individual rent withholdings final.
# 3. Act 896 First Schedule paragraph 8(1)(b) withholding rates, captured
#    here from the base print. Supersession diligence 2015 -> 2026, checked
#    against the full text of every Income Tax (Amendment) Act (eleven
#    prints: Acts 902, 907, 941, 956, 973, 979, 1007, 1017, 1066, 1071,
#    1094, 1111, 1134 — Parliament DSpace ORIGINAL bitstreams for the
#    2015-2018 acts, GRA hosting for 2020+, Assembly Press scan for 1134):
#    rows (i) dividends 8%, (ii) interest paid to individuals 1%, (iii)
#    other interest 8%, (iv)-(vii) rent 8%/15% by payee and property type,
#    and (ix) natural resource payments and royalties 15% were NEVER amended
#    and are the rates in force for 2026. Row (viii) lottery churned
#    (substituted by Act 907 s.2(a); DELETED by Act 956 s.3(c); a new row
#    (x) at 10% added by Act 1094 s.13(e) was DELETED by Act 1134 s.5, which
#    also removed winnings from section 115(1)) — no lottery withholding row
#    is in force for 2026. Rows (xi)/(xii) (realisation consideration, 3%
#    resident / 10% non-resident) were added by Act 1094 s.13(e) and remain
#    in force; they are outside this slice's scope (GHAMOD does not model
#    realisation withholding). Act 902 touched only paragraph 1 tables,
#    paragraph 3(6), a paragraph 8(1)(c) service-fee insertion and the
#    Second Schedule; Acts 941, 973, 979 touched paragraph 1 tables and a
#    paragraph 8(1)(c) row; Act 1071 substituted paragraph 8(3) only
#    ("one and a half per cent", small-scale-miner gold, later removed by
#    Act 1134); Acts 1007, 1017, 1066, 1111 do not touch this surface.
# 4. Income Tax (Amendment) Act, 2016 (Act 907) sections 1-2, captured here:
#    section 1 inserts section 7(1)(p)/(q) of Act 896 — interest paid to an
#    individual by a resident financial institution or on bonds issued by
#    the Government of Ghana, and unit-trust/mutual-fund interest and
#    dividends, are EXEMPT — which narrows the paragraph 8(1)(b)(ii)
#    interest-to-individuals withholding to the residual interest categories.
#
# GHAMOD comparison note (recorded for the parity suite, never a source):
# GH_2025 withholds a flat 15% on investment income (yiy) and 8% on rent
# (ypr). The rent rate matches the residential-rent-to-individual row
# exactly; no in-force paragraph 8(1)(b) rate supports 15% for dividends or
# interest (axiom_oracles ghamod_issues candidate).
