      source_note: >-
        Official electronic Bundesgesetzblatt PDF (BGBl. 2024 I Nr. 449,
        ausgegeben zu Bonn am 30. Dezember 2024), downloaded 2026-07-21 from
        the stable recht.bund.de publicationFile URL. Text-embedded PDF, no
        OCR needed. Captured because the lane's validation year (rules in
        force 2025-06-30) needs the 2025-effective wording that current
        gesetze-im-internet consolidations no longer state. Key contents,
        verbatim-verified against the PDF text: Art. 1 Nr. 1 raises the § 32
        Abs. 6 EStG Kinderfreibetrag "3 306 Euro" to "3 336 Euro"; Art. 1
        Nr. 2 re-enacts § 32a Abs. 1 EStG "ab dem Veranlagungszeitraum 2025"
        with Grundfreibetrag "bis 12 096 Euro" and the full 2025 tariff
        ((932,30 • y + 1 400) • y; (176,64 • z + 2 397) • z + 1 015,13;
        0,42 • x – 10 911,92; 0,45 • x – 19 246,67); Art. 1 Nr. 4 replaces
        "250 Euro" with "255 Euro" in § 66 Abs. 1 EStG (Kindergeld). Art. 2
        re-enacts § 32a for VZ 2026 (Grundfreibetrag 12 348 Euro) and raises
        § 66 Abs. 1 to "259 Euro". Art. 3 raises the SolzG § 3 Abs. 3
        Freigrenze to "39 900 Euro" (Nr. 1) and "19 950 Euro" (Nr. 2) for VZ
        2025; Art. 4 raises them to "40 700 Euro" and "20 350 Euro" for VZ
        2026. Art. 5 raises BKGG § 6 Abs. 1 to "255 Euro" and the § 6a Abs. 2
        Satz 4 Kinderzuschlag-Sofortzuschlag from "20 Euro" to "25 Euro";
        Art. 6 raises BKGG § 6 Abs. 1 to "259 Euro". Art. 7 raises the SGB II
        § 72 Abs. 1 Satz 1 Sofortzuschlag to "25 Euro". Art. 10 Abs. 1: in
        force 1. Januar 2025, except Art. 10 Abs. 2: Artikel 2, 4 und 6 in
        force 1. Januar 2026 — the two-stage structure means this single act
        evidences both the 2025 validation-year values and the 2026 values
        the current consolidations display.
