      in_force: true
      amends: >-
        Einkommensteuergesetz (EStG), in der Fassung der Bekanntmachung vom
        8. Oktober 2009 (BGBl. I S. 3366, 3862) — Art. 1 (ab VZ 2025) amends
        § 32 Abs. 6, § 32a Abs. 1, § 39b Abs. 2 and § 66 Abs. 1; Art. 2
        (ab VZ 2026) amends the same provisions again and appends § 66
        Abs. 3. Solidaritätszuschlaggesetz 1995 (SolzG 1995) — Art. 3
        (ab VZ 2025) amends § 3 Abs. 3, 4, 4a, 5 and appends § 6 Abs. 26;
        Art. 4 (ab VZ 2026) amends § 3 Abs. 3 again and appends § 6 Abs. 27.
        Bundeskindergeldgesetz (BKGG 1996) — Art. 5 (2025) amends § 6 Abs. 1
        and § 6a Abs. 2; Art. 6 (2026) amends § 6. Zweites Buch
        Sozialgesetzbuch (SGB 2) — Art. 7 amends § 72 Abs. 1. Zwölftes Buch
        Sozialgesetzbuch (SGB 12) — Art. 8 Abs. 1 amends § 145 Abs. 1 (with a
        parallel SGB XIV § 93 change in Art. 8 Abs. 2, not in this corpus).
        Finanzausgleichsgesetz § 12a (Art. 9, not in this corpus).
