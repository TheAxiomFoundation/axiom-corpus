# Steuerfortentwicklungsgesetz (SteFeG) — the December 2024 amending act that
# sets the Germany 2025 validation-year tax/benefit parameters (and, in its
# 2026-effective articles, the values the current gesetze-im-internet
# consolidations now display). Captured from the official electronic
# Bundesgesetzblatt (recht.bund.de); since the 2023 BGBl reform the electronic
# issue IS the legally authoritative version.
#
# This is the BGBl-archive route the main DE manifest header documents for
# instruments the GII portal cannot supply (gesetze-im-internet carries only
# current consolidations; RBSFV 2025 precedent). The document is marked as an
# amendment act the same way the dk scope marks ændringslove
# (metadata `amends` + `document_type` containing "amendment act"), plus a
# machine-readable `amendment_targets` list of corpus citation paths: the
# gesetze-im-internet per-norm rows carry no `title`/`title_short` metadata and
# the `estg` slug has no digits, so name/structured-phrase matching in
# axiom-encode's amendment discovery cannot fire for EStG targets — exact
# citation-path relations are the reliable channel.
#
# Run:
#   uv run axiom-corpus-ingest extract-official-documents \
#     --base data/corpus \
#     --version <version> \
#     --manifest manifests/de-stefeg-2024-official-documents.yaml
