        Income Tax (Amendment) Act, 2022 from the Parliament of Uganda
        CMIS repository (Clerk-authenticated printed impression with the
        President's signed assent page; OCR at 300 dpi). Section 5
        (arrangement item; operative section numbered 5 in the body)
        amends s.22(1) so rental expenditure deductions apply only to
        persons other than individuals or partnerships, and the final
        section substitutes Third Schedule Part VI - the individual
