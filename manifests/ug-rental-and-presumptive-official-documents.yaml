# Uganda rental-tax and presumptive-tax capture (rulespec-ug instruments
# 3-4, UGAMOD tpr_ug / ttn_ug parity; tracking rulespec-ug#1).
#
# 1. Rental: the Income Tax (Amendment) Act, 2022 (assent 2 June 2022,
#    in force 1 July 2022 = FY2022/23) substitutes Third Schedule
#    Part VI — "Rate of Rental Tax applicable to an individual": nil to
#    Ushs 2,820,000 per annum (235,000 per month); 12% above — and
#    amends s.22(1)(c) so rental expenses are deductible only by
#    persons OTHER than individuals or partnerships (individuals are
#    taxed on gross rental income above the threshold). The later chain
#    (2023, 2023 No.2, 2024 prints held locally) does not touch the
#    rental provisions; the 2023 Revised Edition renumbers the part as
#    Third Schedule Part II.
# 2. Presumptive: the Income Tax (Amendment) Act, 2020 (Act 20 of 2020
#    on the gazette face, Acts Supplement No. 12, 27 November 2020)
#    substitutes the Second Schedule small-business taxpayers rates:
#    four turnover bands from 10,000,000 to 150,000,000 shillings with
#    fixed amounts for taxpayers without records (80,000 / 200,000 /
#    400,000 / 900,000) and cumulative-component rates for taxpayers
#    with records (0.4% over 10m; 80,000 + 0.5% over 30m; 180,000 +
#    0.6% over 50m; 360,000 + 0.7% over 80m). Unchanged by the
#    2021-2024 chain.
#
# UGAMOD comparison notes (targets, never sources): tpr_s probed exact
# (12% x (gross - 2,820,000): 5m -> 261,600; 10m -> 861,600); ttn_ug
# implements both regimes on the ytn turnover variable with marginal
# bands equal to the statutory cumulative components.
#
# Act-number note: the 2022 print is the Clerk-authenticated impression
# (no act number on its face; the President's assent page is bound in);
# "Act 11 of 2022" is corroborated by contemporaneous professional
# summaries and the 2022 gazette numbering sequence (Act 3 Succession
# 31 May, Act 9 Landlord & Tenant 17 Jun, Act 15 Appropriation 22 Jun)
# and is recorded here as metadata, with the citation path carrying it
# for consistency with the act-number path convention.
