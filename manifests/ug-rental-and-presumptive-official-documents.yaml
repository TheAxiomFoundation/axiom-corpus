        taxpayers tax rates: turnover bands 10m-30m / 30m-50m /
        50m-80m / 80m-150m shillings with fixed amounts for taxpayers
        not keeping records and cumulative-component rates for
        taxpayers with records. In force for years of income from
        1 July 2020 (URA operationalised the new rates a year late in
        its e-tax system, a compliance note only); unchanged through
        FY2025/26 (2021-2024 prints held for diligence).
