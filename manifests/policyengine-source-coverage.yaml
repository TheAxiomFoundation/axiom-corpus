schema_version: axiom-corpus/policyengine-source-coverage/v1
generated_at: '2026-05-23T14:19:37.371383+00:00'
coverage_goal: Track every source document family cited anywhere in upstream PolicyEngine US and UK, then promote official primary sources into source-first Axiom corpus manifests.
source_policy:
  policyengine_is_discovery_only: true
  ingest_only_primary_sources_by_default: true
  do_not_ingest_values_from_policyengine: true
  do_not_treat_secondary_mirrors_as_canonical: true
priority_policy:
  p0: Tax forms/instructions, tax law and regulations, refundable credits, payroll/social-insurance rules, and cash-benefit rules used directly in net income calculations.
  p1: Means-tested benefit manuals, eligibility guidance, state plans, and program tables that determine benefit amounts or eligibility but may need more adapter work.
  p2: Broad statutes, regulations, rulemaking, and official guidance that are useful for legal grounding but less directly parameterized in the model.
  p3: Reference-only, historical, mixed, or adapter-blocked groups that should wait until higher-impact source families are covered.
upstream_reference_inventories:
- project: policyengine-us
  url_inventory: sources/policyengine-us/all_url_references.txt
  reference_scope: fresh upstream clone; all .yaml/.yml/.py/.md URL references
  upstream_commit: f9259c6dcd1db91c3f77573df8c14ae3a482bf62
- project: policyengine-uk
  url_inventory: sources/policyengine-uk/all_url_references.txt
  reference_scope: fresh upstream clone; all .yaml/.yml/.py/.md URL references
  upstream_commit: ca90dddf0d700f8d3fa45b5f2be6af857cb5141e
source_discovery_report:
  generated_path: data/corpus/analytics/source-discovery-policyengine-current.json
  tracked_in_git: false
  command: uv run --extra dev axiom-corpus-ingest source-discovery --base data/corpus --input sources/policyengine-us/all_url_references.txt --input sources/policyengine-uk/all_url_references.txt --source-name policyengine --release current --output data/corpus/analytics/source-discovery-policyengine-current.json
source_discovery_summary:
  raw_url_count: 9830
  invalid_url_count: 0
  unique_url_count: 7197
  ready_for_manifest_count: 1437
  ready_group_count: 158
  needs_review_count: 5050
  blocked_or_excluded_count: 710
  release_scope_present_count: 12
fill_in_fields:
  status:
  - backlog
  - triaged
  - manifested
  - ingested
  - published
  - covered
  - blocked
  priority:
  - p0
  - p1
  - p2
  - p3
  coverage_status:
  - not_started
  - needs_official_source_review
  - manifest_ready
  - adapter_needed
  - ingested_local
  - published_r2
  - loaded_supabase
  - covered
  - blocked_secondary_or_vendor
  target_manifest: Path to the source-first corpus manifest that owns this document family.
  target_release_scope: Corpus release scope expected after ingestion.
  corpus_artifacts: Concrete sources/inventory/provisions/coverage artifact paths after ingestion.
known_limitations:
- This coverage seed is URL-group based. The PolicyEngine reference extractor can preserve non-URL legal citations, such as bare Act or Code references, but those citations need a resolver before they can be added under additional_source_sets or merged into existing groups.
- Rows classified as unknown, secondary, analytical, or vendor-only stay in the JSON report for review but are not promoted into document_groups until an official source path is identified.
- PolicyEngine references are discovery provenance only; every target manifest must refetch and hash official source documents independently.
